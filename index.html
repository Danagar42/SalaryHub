                  <motion.button whileTap={{ scale: 0.95 }} onClick={() => startEditing(activeMonthData.id)} className="text-xs md:text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-900/50 px-2.5 py-1 rounded-lg flex items-center gap-1.5 transition-colors"><IconEdit /> Редагувати</motion.button>
                </h1>
                <p className="text-slate-500 dark:text-slate-400 mt-1 text-sm">Детальні нарахування</p>
              </div>
            </div>
            
            <div className="flex items-center gap-2 w-full md:w-auto">
              <button 
                onClick={() => setSelectedMonthId(prevMonthData.id)} 
                disabled={!prevMonthData}
                className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Попередній місяць (Стрілка вліво)"
              >
                <IconChevronLeft />
              </button>
              <CustomSelect value={selectedMonthId} onChange={setSelectedMonthId} options={summaryData.map(m => ({ value: m.id, label: `${m.monthName} ${m.year}` }))} icon={IconCalendar} />
              <button 
                onClick={() => setSelectedMonthId(nextMonthData.id)} 
                disabled={!nextMonthData}
                className="p-2 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                title="Наступний місяць (Стрілка вправо)"
              >
                <IconChevronRight />
              </button>
            </div>
          </div>

          {insights.length > 0 && (
            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="bg-gradient-to-r from-indigo-50 to-blue-50 dark:from-indigo-900/20 dark:to-blue-900/20 p-4 md:p-5 rounded-2xl border border-indigo-100 dark:border-indigo-800/30 flex items-start gap-3 md:gap-4 transition-colors">
              <div className="text-xl md:text-2xl mt-0.5" style={{ filter: 'drop-shadow(0 2px 4px rgba(99, 102, 241, 0.4))' }}>💡</div>
              <div className="flex-1">
                <h3 className="text-sm font-bold text-indigo-900 dark:text-indigo-300 mb-2 uppercase tracking-wider">Аналітика місяця</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {insights.map((insight, i) => (
                    <motion.div initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} transition={{ delay: i * 0.1 }} key={insight.id} className="flex items-start gap-2.5 bg-white/60 dark:bg-slate-800/50 p-3 rounded-xl border border-white dark:border-slate-700/50 shadow-sm backdrop-blur-sm">
                      <span className="text-base shrink-0">{insight.icon}</span>
                      <span className="text-sm font-medium text-slate-700 dark:text-slate-300 leading-snug">{insight.text}</span>
                    </motion.div>
                  ))}
                </div>
              </div>
            </motion.div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-emerald-100 dark:border-emerald-900/30 flex flex-col transition-colors overflow-hidden">
              <div className="bg-emerald-50 dark:bg-emerald-900/20 px-5 md:px-6 py-4 border-b border-emerald-100 dark:border-emerald-900/30 flex justify-between items-center z-10 relative">
                <h3 className="text-lg font-bold text-emerald-800 dark:text-emerald-400">Нараховано</h3>
                <span className="text-emerald-700 dark:text-emerald-300 bg-emerald-100 dark:bg-emerald-900/40 px-3 py-1 md:px-4 md:py-1.5 rounded-full text-sm font-bold shadow-sm">
                  <AnimatedNumber value={activeMonthData.totalAccrued} currency="UAH" />
                </span>
              </div>
              <div className="flex-1 overflow-x-auto no-scrollbar relative pb-2">
                <table className="w-full text-sm text-left">
                  <thead className="bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700 sticky top-0 z-20 backdrop-blur-sm shadow-[0_1px_2px_rgba(0,0,0,0.05)] dark:shadow-[0_1px_2px_rgba(0,0,0,0.3)]">
                    <tr><th className="px-5 md:px-6 py-3 font-medium whitespace-nowrap">Вид оплати</th><th className="px-3 md:px-4 py-3 font-medium text-center whitespace-nowrap">Дні/Год</th><th className="px-5 md:px-6 py-3 font-medium text-right whitespace-nowrap">Сума</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50 dark:divide-slate-700/50">
                    {activeMonthData.accruals.map((item, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors duration-300 ease-in-out">
                        <td className="px-5 md:px-6 py-3 md:py-4"><div className="flex items-center flex-wrap gap-2"><span className="font-semibold text-slate-800 dark:text-slate-200">{item.name}</span>{item.percent && <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold font-mono bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 border border-purple-200 dark:border-purple-800">{item.percent}</span>}</div></td>
                        <td className="px-3 md:px-4 py-3 md:py-4 text-center text-slate-600 dark:text-slate-400 font-medium font-mono whitespace-nowrap">{item.days} / {item.hours}</td>
                        <td className="px-5 md:px-6 py-3 md:py-4 text-right font-bold text-slate-800 dark:text-slate-200 font-mono tracking-tight whitespace-nowrap"><PrivacyText text={formatCurrency(item.amount, 'UAH')} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-rose-100 dark:border-rose-900/30 flex flex-col transition-colors overflow-hidden">
              <div className="bg-rose-50 dark:bg-rose-900/20 px-5 md:px-6 py-4 border-b border-rose-100 dark:border-rose-900/30 flex justify-between items-center z-10 relative">
                <h3 className="text-lg font-bold text-rose-800 dark:text-rose-400">Утримано</h3>
                <span className="text-rose-700 dark:text-rose-300 bg-rose-100 dark:bg-rose-900/40 px-3 py-1 md:px-4 md:py-1.5 rounded-full text-sm font-bold shadow-sm">
                  <AnimatedNumber value={trueDeductionsSum} currency="UAH" />
                </span>
              </div>
              
              {activeMonthData.taxWarnings && activeMonthData.taxWarnings.length > 0 && (
                <div className="bg-amber-50 dark:bg-amber-900/20 px-5 py-2.5 border-b border-amber-100 dark:border-amber-900/30 text-xs text-amber-800 dark:text-amber-400">
                  <div className="flex items-start gap-1.5">
                    <IconAlert />
                    <div>
                      <p className="font-bold mb-0.5">Можлива неточність в податках:</p>
                      <ul className="list-disc list-inside font-mono text-[11px]">
                        {activeMonthData.taxWarnings.map((w, i) => <li key={i}>{w}</li>)}
                      </ul>
                    </div>
                  </div>
                </div>
              )}

              <div className="flex-1 overflow-x-auto no-scrollbar relative pb-2">
                <table className="w-full text-sm text-left">
                  <thead className="bg-white dark:bg-slate-800 text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700 sticky top-0 z-20 backdrop-blur-sm shadow-[0_1px_2px_rgba(0,0,0,0.05)] dark:shadow-[0_1px_2px_rgba(0,0,0,0.3)]">
                    <tr><th className="px-5 md:px-6 py-3 font-medium whitespace-nowrap">Вид утримання</th><th className="px-5 md:px-6 py-3 font-medium text-right whitespace-nowrap">Сума</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-50 dark:divide-slate-700/50">
                    {trueDeductions.map((item, idx) => (
                      <tr key={`tax-${idx}`} className="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors duration-300 ease-in-out">
                        <td className="px-5 md:px-6 py-3 md:py-4"><div className="font-semibold text-slate-800 dark:text-slate-200">{item.name}</div></td>
                        <td className="px-5 md:px-6 py-3 md:py-4 text-right font-bold text-slate-800 dark:text-slate-200 font-mono tracking-tight whitespace-nowrap"><PrivacyText text={formatCurrency(item.amount, 'UAH')} /></td>
                      </tr>
                    ))}
                  </tbody>
                  {payoutItems.length > 0 && (
                    <tbody className="divide-y divide-slate-50 dark:divide-slate-700/50 border-t-2 border-slate-100 dark:border-slate-600 bg-slate-50/50 dark:bg-slate-800/30">
                      <tr>
                        <td colSpan="2" className="px-5 md:px-6 py-2.5 text-[11px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest bg-slate-100 dark:bg-slate-900/60">Фактичні виплати</td>
                      </tr>
                      {payoutItems.map((item, idx) => (
                        <tr key={`pay-${idx}`} className="hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors duration-300 ease-in-out">
                          <td className="px-5 md:px-6 py-3 md:py-4"><div className="font-semibold text-slate-700 dark:text-slate-300">{item.name}</div></td>
                          <td className="px-5 md:px-6 py-3 md:py-4 text-right font-bold text-slate-700 dark:text-slate-300 font-mono tracking-tight whitespace-nowrap"><PrivacyText text={formatCurrency(item.amount, 'UAH')} /></td>
                        </tr>
                      ))}
                    </tbody>
                  )}
                </table>
              </div>
            </div>
          </div>

          <div className="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 grid grid-cols-1 md:grid-cols-2 gap-6 mt-6">
             <div>
                <h3 className="text-center font-bold text-slate-700 dark:text-slate-300 mb-4">Структура Нарахувань</h3>
                <div className="relative h-[220px]">
                  {accrualPieData.length > 0 ? (
                    <>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
                        <span className="font-black text-slate-800 dark:text-slate-100 text-lg tracking-tight font-mono">
                          <PrivacyText text={formatCurrency(totalAccrualPie, 'UAH')} />
                        </span>
                        <span className="text-xs text-slate-400 font-medium mt-0.5">нараховано</span>
                      </div>
                      <WidgetErrorBoundary>
                        <div className="relative z-10 w-full h-full">
                          <ResponsiveContainer width="100%" height="100%">
                            <PieChart>
                              <Pie data={accrualPieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} cornerRadius={5} dataKey="value" stroke="none">
                                {accrualPieData.map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.color} />))}
                              </Pie>
                              <RechartsTooltip content={<CustomPieTooltip total={totalAccrualPie} />} cursor={{fill: 'transparent'}} wrapperStyle={{ zIndex: 100 }} />
                            </PieChart>
                          </ResponsiveContainer>
                        </div>
                      </WidgetErrorBoundary>
                    </>
                  ) : <div className="h-full flex items-center justify-center text-slate-400 text-sm">Немає даних</div>}
                </div>
                <div className="flex flex-wrap justify-center gap-3 mt-4">
                  {accrualPieData.map((entry) => {
                    const pct = totalAccrualPie > 0 ? Math.round((entry.value / totalAccrualPie) * 100) : 0;
                    return (
                      <div key={entry.name} className="flex items-center text-xs text-slate-600 dark:text-slate-400 font-medium">
                        <div className="w-3 h-3 rounded-full mr-1.5 shrink-0" style={{backgroundColor: entry.color}}></div>
                        <span>{entry.name} <span className="opacity-60 ml-0.5 font-mono">({pct}%)</span></span>
                      </div>
                    );
                  })}
                </div>
             </div>
             <div className="border-t border-slate-100 dark:border-slate-700 pt-6 md:pt-0 md:border-t-0 md:border-l md:pl-6">
                <h3 className="text-center font-bold text-slate-700 dark:text-slate-300 mb-4">Структура Утримань</h3>
                <div className="relative h-[220px]">
                  {deductionPieData.length > 0 ? (
                    <>
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
                        <span className="font-black text-slate-800 dark:text-slate-100 text-lg tracking-tight font-mono">
                          <PrivacyText text={formatCurrency(totalDeductionPie, 'UAH')} />
                        </span>
                        <span className="text-xs text-slate-400 font-medium mt-0.5">податки</span>
                      </div>
                      <WidgetErrorBoundary>
                        <div className="relative z-10 w-full h-full">
                          <ResponsiveContainer width="100%" height="100%">
                            <PieChart>
                              <Pie data={deductionPieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={4} cornerRadius={5} dataKey="value" stroke="none">
                                {deductionPieData.map((entry, index) => (<Cell key={`cell-${index}`} fill={entry.color} />))}
                              </Pie>
                              <RechartsTooltip content={<CustomPieTooltip total={totalDeductionPie} />} cursor={{fill: 'transparent'}} wrapperStyle={{ zIndex: 100 }} />
                            </PieChart>
                          </ResponsiveContainer>
                        </div>
                      </WidgetErrorBoundary>
                    </>
                  ) : <div className="h-full flex items-center justify-center text-slate-400 text-sm">Немає даних</div>}
                </div>
                <div className="flex flex-wrap justify-center gap-3 mt-4">
                  {deductionPieData.map((entry) => {
                    const pct = totalDeductionPie > 0 ? Math.round((entry.value / totalDeductionPie) * 100) : 0;
                    return (
                      <div key={entry.name} className="flex items-center text-xs text-slate-600 dark:text-slate-400 font-medium">
                        <div className="w-3 h-3 rounded-full mr-1.5 shrink-0" style={{backgroundColor: entry.color}}></div>
                        <span>{entry.name} <span className="opacity-60 ml-0.5 font-mono">({pct}%)</span></span>
                      </div>
                    );
                  })}
                </div>
             </div>
          </div>

          <div className="bg-slate-800 text-white rounded-2xl shadow-2xl md:shadow-lg flex flex-col relative overflow-hidden border border-slate-700 sticky bottom-4 z-40 md:static mt-6 ring-4 ring-slate-900/10 md:ring-0">
            <div className="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-5 rounded-full blur-2xl pointer-events-none"></div>
            
            <div className="p-5 md:p-8 flex flex-col md:flex-row justify-between items-center relative z-10 gap-5">
              <div className="text-center md:text-left w-full md:w-auto">
                <div className="flex items-center justify-between md:justify-start gap-3 w-full">
                  <h2 className="text-xl md:text-2xl font-bold text-slate-100">Чистий дохід</h2>
                  <motion.button whileTap={{ scale: 0.95 }} onClick={() => setShowMath(!showMath)} className="text-xs bg-slate-700/50 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded-lg border border-slate-600 transition-colors flex items-center gap-1.5 focus:outline-none" aria-expanded={showMath}>
                    {showMath ? "Згорнути" : "Детальніше"}
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: showMath ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}><polyline points="6 9 12 15 18 9"></polyline></svg>
                  </motion.button>
                </div>
                <p className="text-sm text-slate-400 mt-1 text-left hidden md:block">Зароблено після податків (включає аванс).</p>
              </div>
              <div className="bg-slate-900/50 px-6 py-4 rounded-xl border border-slate-700 w-full md:w-auto text-center flex flex-col justify-center shadow-inner">
                <div className="text-3xl md:text-4xl font-black text-emerald-400 tracking-tight">
                  <AnimatedNumber value={activeMonthData.netPay} currency="UAH" />
                </div>
                {diffNode}
                {yoyNode}
              </div>
            </div>

            <AnimatePresence>
              {showMath && (
                <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="bg-slate-900 border-t border-slate-700/50 overflow-hidden">
                  <div className="p-5 md:p-8">
                    <div className="max-w-2xl mx-auto md:mx-0 bg-slate-800/50 rounded-xl border border-slate-700/50 p-4 md:p-5 text-sm md:text-base">
                      <div className="flex justify-between items-center pb-3 border-b border-slate-700/50">
                        <div className="flex flex-col"><span className="text-slate-300 font-medium">Сумарні нарахування</span></div>
                        <span className="text-emerald-400 font-bold font-mono tracking-tight">+<PrivacyText text={formatCurrency(activeMonthData.totalAccrued, 'UAH')} /></span>
                      </div>
                      <div className="flex justify-between items-center py-3 border-b border-slate-700/50">
                        <div className="flex flex-col"><span className="text-slate-300 font-medium">Сумарні утримання</span><span className="text-xs text-slate-500">Податки, збори</span></div>
                        <span className="text-rose-400 font-bold font-mono tracking-tight">-<PrivacyText text={formatCurrency(taxSum, 'UAH')} /></span>
                      </div>
                      <div className="flex justify-between items-center py-3 border-b border-slate-700/50">
                        <div className="flex flex-col"><span className="text-slate-300 font-medium">Вже виплачено</span><span className="text-xs text-slate-500">Аванси</span></div>
                        <span className="text-slate-300 font-bold font-mono tracking-tight"><PrivacyText text={formatCurrency(advanceSum, 'UAH')} /></span>
                      </div>
                      {activeMonthData.prevMonthVacationPayout > 0 && (
                        <div className="flex justify-between items-center py-3 border-b border-slate-700/50">
                          <div className="flex flex-col"><span className="text-slate-300 font-medium">Відпускні з минулого місяця</span><span className="text-xs text-slate-500">Плюсуються до поточного доходу</span></div>
                          <span className="text-emerald-400 font-bold font-mono tracking-tight">+<PrivacyText text={formatCurrency(activeMonthData.prevMonthVacationPayout, 'UAH')} /></span>
                        </div>
                      )}
                      <div className="flex justify-between items-center pt-3 pb-4">
                        <div className="flex flex-col"><span className="text-slate-300 font-medium">До виплати</span><span className="text-xs text-slate-500">Залишок на карту</span></div>
                        <span className="text-slate-300 font-bold font-mono tracking-tight"><PrivacyText text={formatCurrency(activeMonthData.toBank, 'UAH')} /></span>
                      </div>
                      <div className="flex justify-between items-center py-4 border-t border-slate-700/50 bg-slate-800/40 -mx-4 md:-mx-5 -mb-4 md:-mb-5 px-4 md:px-5 rounded-b-xl shadow-inner">
                        <div className="flex flex-col"><span className="text-white font-bold text-lg">Чистий дохід</span></div>
                        <span className="text-emerald-400 font-black text-xl font-mono tracking-tight"><PrivacyText text={formatCurrency(activeMonthData.netPay, 'UAH')} /></span>
                      </div>
                    </div>
                  </div>
                </motion.div>
              )}
            </AnimatePresence>
          </div>
        </motion.div>
      );
    };

    const AddPayslipView = () => {
      const { dbData, setDbData, setSelectedMonthId, handleTabChange, showToast, isFormDirty, setIsFormDirty, editingPayslip, setEditingPayslip, hasSeenImportHint, setHasSeenImportHint } = useSalaryContext();
      
      const [monthIdx, setMonthIdx] = useState(0); const [year, setYear] = useState(''); const [pastedText, setPastedText] = useState('');
      const [accruals, setAccruals] = useState([]); const [deductions, setDeductions] = useState([]);
      const [overwriteConfirm, setOverwriteConfirm] = useState(null);
      
      const [parserPreviewData, setParserPreviewData] = useState(null);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') {
            if (parserPreviewData) setParserPreviewData(null);
            if (overwriteConfirm) setOverwriteConfirm(null);
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [parserPreviewData, overwriteConfirm]);

      useEffect(() => {
        const handleBeforeUnloadForm = (e) => {
          if (pastedText.trim().length > 0 || isFormDirty) {
            e.preventDefault();
            e.returnValue = 'У вас є незбережені дані у формі!';
          }
        };
        window.addEventListener('beforeunload', handleBeforeUnloadForm);
        return () => window.removeEventListener('beforeunload', handleBeforeUnloadForm);
      }, [pastedText, isFormDirty]);

      useEffect(() => {
        if (editingPayslip) {
          setMonthIdx(editingPayslip.month - 1); setYear(editingPayslip.year.toString());
          setAccruals(editingPayslip.accruals.length ? editingPayslip.accruals.map(a => ({...a, id: generateId()})) : []);
          setDeductions(editingPayslip.deductions.length ? editingPayslip.deductions.map(d => ({...d, id: generateId()})) : []);
        } else {
          const today = new Date(); setMonthIdx(today.getMonth()); setYear(today.getFullYear().toString());
          setAccruals([{ id: generateId(), name: 'Посадовий оклад', percent: '', days: 21, hours: '168:0', amount: '' }]);
          setDeductions([{ id: generateId(), name: 'Плановий аванс', amount: '' }, { id: generateId(), name: 'Профвнески', amount: '' }, { id: generateId(), name: 'Податок з доход. фіз.ос.', amount: '' }, { id: generateId(), name: 'Військовий збір', amount: '' }]);
        }
      }, [editingPayslip]);

      const currentAccrued = accruals.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
      const currentDeducted = deductions.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
      const currentNet = currentAccrued - currentDeducted;
      
      const calcPdfo = currentAccrued * 0.18;
      const vzRate = Number(year) <= 2024 ? 0.015 : 0.05;
      const calcVz = currentAccrued * vzRate;
      let actualPdfo = 0; let actualVz = 0;
      
      deductions.forEach(d => {
        const lowerName = (d.name || '').toLowerCase();
        if (lowerName.includes('податок') || lowerName.includes('пдфо')) actualPdfo += Number(d.amount || 0);
        if (lowerName.includes('військов') || lowerName.includes('вз')) actualVz += Number(d.amount || 0);
      });
      
      const showTaxWarning = (actualPdfo > 0 && Math.abs(actualPdfo - calcPdfo) > 5) || (actualVz > 0 && Math.abs(actualVz - calcVz) > 5);

      const markDirty = () => setIsFormDirty(true);
      const handleAddAccrual = () => { setAccruals([...accruals, { id: generateId(), name: '', percent: '', days: 0, hours: '0:0', amount: '' }]); markDirty(); };
      const handleAddDeduction = () => { setDeductions([...deductions, { id: generateId(), name: '', amount: '' }]); markDirty(); };
      const removeAccrual = (id) => { setAccruals(accruals.filter(a => a.id !== id)); markDirty(); };
      const removeDeduction = (id) => { setDeductions(deductions.filter(d => d.id !== id)); markDirty(); };

      const applyParsedResult = (result) => {
        if (result.success) {
          setHasSeenImportHint(true); 
          const tempAcc = result.accruals.reduce((s, i) => s + i.amount, 0);
          const tempDed = result.deductions.reduce((s, i) => s + i.amount, 0);
          
          let hasSuspiciousData = false;
          if (tempAcc === 0 && tempDed > 0) hasSuspiciousData = true;
          
          setParserPreviewData({ ...result, hasSuspiciousData, tempAcc, tempDed });
        } else { 
          showToast("Не вдалося розпізнати дані. Перевірте формат.", "error"); 
          setParserPreviewData(null);
        }
      };

      const handleParseAttempt = () => {
        if (!pastedText.trim()) return;
        
        // Змінено виклик функції
        const result = ParserModule.parseTextPayslip(pastedText);
        applyParsedResult(result);
      };

      // ДОДАНО: Обробник для завантаження Excel
      const handleExcelUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = window.XLSX.read(data, { type: 'array' });
                
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                // Передаємо Excel напряму як масив масивів (Grid) без конвертації в текст!
                const rows = window.XLSX.utils.sheet_to_json(worksheet, { header: 1, raw: true, defval: null });
                const result = ParserModule.parseGrid(rows); 
                
                applyParsedResult(result);
            } catch (error) {
                console.error("Excel parse error:", error);
                showToast("Помилка читання Excel файлу. Переконайтесь що файл непошкоджений.", "error");
            }
        };
        
        reader.readAsArrayBuffer(file);
        e.target.value = null;
      };

      const confirmParserPreview = () => {
        if (parserPreviewData.accruals.length > 0) setAccruals(parserPreviewData.accruals); 
        if (parserPreviewData.deductions.length > 0) setDeductions(parserPreviewData.deductions);
        if (parserPreviewData.period) { 
          setMonthIdx(parserPreviewData.period.monthIdx); 
          setYear(parserPreviewData.period.year.toString()); 
        }
        setPastedText(''); markDirty(); 
        setParserPreviewData(null);
        showToast("Дані успішно перенесено у форму!", "success");
      };

      const cleanDataList = (list) => list.filter(item => item.name.trim() !== '' && item.amount !== '' && !isNaN(Number(item.amount))).map(item => ({ ...item, amount: Number(item.amount) }));

      const handleFormSubmit = (e) => {
        e.preventDefault();
        
        if (currentNet < 0) {
           showToast("Помилка: Чистий дохід не може бути від'ємним. Перевірте суми утримань.", "error");
           return;
        }

        const monthId = `${year}-${String(monthIdx + 1).padStart(2, '0')}`; 
        const cleanedAccruals = cleanDataList(accruals); const cleanedDeductions = cleanDataList(deductions);
        if(cleanedAccruals.length === 0 && cleanedDeductions.length === 0) { showToast("Форма порожня або містить некоректні дані.", "error"); return; }

        const newSlip = { id: monthId, month: monthIdx + 1, year: Number(year), monthName: MONTH_NAMES[monthIdx], accruals: cleanedAccruals, deductions: cleanedDeductions };
        if (editingPayslip && editingPayslip.id === monthId) savePayslip(newSlip);
        else if (dbData.some(d => d.id === monthId)) setOverwriteConfirm(newSlip);
        else savePayslip(newSlip);
      };

      const savePayslip = (newSlip) => {
        let updatedData = dbData.filter(d => d.id !== newSlip.id);
        if (editingPayslip && editingPayslip.id !== newSlip.id) updatedData = updatedData.filter(d => d.id !== editingPayslip.id);
        setDbData([...updatedData, newSlip]); setSelectedMonthId(newSlip.id);
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#3b82f6', '#10b981', '#a855f7', '#f59e0b'] });
        showToast(editingPayslip ? "Зміни успішно збережено!" : "Збережено локально. Не забудьте експортувати базу!", "success");
        setIsFormDirty(false); setEditingPayslip(null); handleTabChange('payslips', true); setOverwriteConfirm(null);
      };

      return (
        <motion.div variants={pageVariants} initial="initial" animate="animate" exit="exit" className="max-w-4xl mx-auto space-y-6 pb-10 relative">
          
          <AnimatePresence>
            {parserPreviewData && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
                <motion.div initial={{ scale: 0.95, opacity: 0, y: 20 }} animate={{ scale: 1, opacity: 1, y: 0 }} exit={{ scale: 0.95, opacity: 0, y: 20 }} className="bg-white/95 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.2)] dark:shadow-[0_0_40px_rgba(0,0,0,0.5)] max-w-2xl w-full p-6 border border-white/20 dark:border-slate-700/50 max-h-[90vh] flex flex-col">
                  <div className="flex items-center justify-between mb-4 shrink-0">
                    <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconCheck /> Попередній перегляд імпорту</h3>
                    <button onClick={() => setParserPreviewData(null)} className="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors"><IconX /></button>
                  </div>
                  
                  <div className="overflow-y-auto pr-2 no-scrollbar flex-1">
                    <p className="text-slate-500 dark:text-slate-400 text-sm mb-4">Ось що нам вдалося розпізнати. Перевірте дані перед додаванням до форми.</p>

                    {parserPreviewData.hasSuspiciousData && (
                    <div className="mb-4 flex items-center gap-2 bg-blue-50 dark:bg-blue-900/30 p-3 rounded-xl border border-blue-100 dark:border-blue-800/50">
                      <IconCalendar /> <span className="font-semibold text-blue-800 dark:text-blue-300">Визначений період:</span> <span className="font-bold text-blue-900 dark:text-blue-200">{MONTH_NAMES[parserPreviewData.period.monthIdx]} {parserPreviewData.period.year}</span>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-emerald-50 dark:bg-emerald-900/10 rounded-xl p-4 border border-emerald-100 dark:border-emerald-900/30">
                      <h4 className="font-bold text-emerald-800 dark:text-emerald-400 border-b border-emerald-200 dark:border-emerald-800/50 pb-2 mb-3 font-mono tracking-tight">Нарахування: {formatCurrency(parserPreviewData.tempAcc, 'UAH')}</h4>
                      <ul className="space-y-2 text-sm">
                        {parserPreviewData.accruals.map((a, i) => (
                          <li key={i} className="flex justify-between items-center border-b border-emerald-100/50 dark:border-emerald-800/30 pb-1">
                            <span className="text-slate-700 dark:text-slate-300 truncate mr-2" title={a.name}>{a.name}</span>
                            <span className="font-bold text-emerald-700 dark:text-emerald-400 font-mono tracking-tight shrink-0">{formatCurrency(a.amount, 'UAH')}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                    
                    <div className="bg-rose-50 dark:bg-rose-900/10 rounded-xl p-4 border border-rose-100 dark:border-rose-900/30">
                      <h4 className="font-bold text-rose-800 dark:text-rose-400 border-b border-rose-200 dark:border-rose-800/50 pb-2 mb-3 font-mono tracking-tight">Утримання: {formatCurrency(parserPreviewData.tempDed, 'UAH')}</h4>
                      <ul className="space-y-2 text-sm">
                        {parserPreviewData.deductions.map((d, i) => (
                          <li key={i} className="flex justify-between items-center border-b border-rose-100/50 dark:border-rose-800/30 pb-1">
                            <span className="text-slate-700 dark:text-slate-300 truncate mr-2" title={d.name}>{d.name}</span>
                            <span className="font-bold text-rose-700 dark:text-rose-400 font-mono tracking-tight shrink-0">{formatCurrency(d.amount, 'UAH')}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>
                  </div>

                  <div className="flex justify-end gap-3 mt-4 pt-4 border-t border-slate-200 dark:border-slate-700 shrink-0">
                    <button type="button" onClick={() => setParserPreviewData(null)} className="px-5 py-2.5 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">Скасувати</button>
                    <button type="button" onClick={confirmParserPreview} className="px-6 py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-sm">Застосувати у форму</button>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          <AnimatePresence>
            {overwriteConfirm && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
                <motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.95, opacity: 0 }} className="bg-white/95 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-2xl max-w-md w-full p-6 border border-white/20 dark:border-slate-700/50">
                  <div className="flex items-center gap-3 text-amber-600 dark:text-amber-500 mb-4"><div className="bg-amber-100 dark:bg-amber-900/30 p-2 rounded-full"><IconAlert /></div><h3 className="text-xl font-bold">Оновлення даних</h3></div>
                  <p className="text-slate-600 dark:text-slate-300 mb-6">Розрахунковий лист за <b>{overwriteConfirm.monthName} {overwriteConfirm.year}</b> вже існує. Бажаєте перезаписати старі дані?</p>
                  <div className="flex justify-end gap-3">
                    <button type="button" onClick={() => setOverwriteConfirm(null)} className="px-4 py-2 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">Скасувати</button>
                    <button type="button" onClick={() => savePayslip(overwriteConfirm)} className="px-4 py-2 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 transition shadow-sm">Перезаписати</button>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {!editingPayslip ? (
            <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
              <div className="mb-4"><h2 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 mb-1">Швидкий імпорт</h2><p className="text-slate-500 dark:text-slate-400 text-xs md:text-sm">Завантажте файл Excel або вставте скопійований текст</p></div>
              <div className="relative bg-blue-50 dark:bg-blue-900/20 p-4 md:p-5 rounded-xl border border-blue-100 dark:border-blue-800/50 transition-colors">
                
                {!hasSeenImportHint && pastedText.length === 0 && (
                  <motion.div initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }} className="absolute -top-14 sm:-top-12 left-4 z-10 bg-indigo-900/80 dark:bg-indigo-900/90 backdrop-blur-md text-white p-2.5 sm:p-3 rounded-xl border border-white/20 shadow-2xl flex items-center gap-3">
                    <span className="text-xl animate-bounce">💡</span>
                    <div className="text-sm">
                      <p className="font-bold">Як це працює?</p>
                      <p className="opacity-90 text-xs hidden sm:block">Скопіюйте текст із PDF чи завантажте оригінальний файл .xls/.xlsx</p>
                    </div>
                    <button type="button" onClick={() => setHasSeenImportHint(true)} className="ml-1 bg-white/20 hover:bg-white/30 text-white px-2 py-1 rounded text-xs font-bold transition-colors">Зрозумів</button>
                    <div className="absolute -bottom-2 left-6 w-4 h-4 bg-indigo-900/80 dark:bg-indigo-900/90 backdrop-blur-md border-b border-r border-white/20 transform rotate-45"></div>
                  </motion.div>
                )}

                <div className="flex flex-col md:flex-row gap-4">
                  <textarea value={pastedText} onChange={(e) => setPastedText(e.target.value)} placeholder="Вставте сюди скопійований текст..." className="flex-1 h-24 bg-white dark:bg-slate-800 border border-blue-200 dark:border-blue-700 text-slate-800 dark:text-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 resize-none text-sm placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-colors relative z-0" />
                  
                  {/* ДОДАНО: Блок кнопок з опцією Excel */}
                  <div className="flex flex-col gap-2 w-full md:w-48 shrink-0">
                    <motion.button whileTap={{ scale: 0.95 }} type="button" onClick={handleParseAttempt} disabled={!pastedText.trim()} className="w-full py-2.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed shadow-sm flex items-center justify-center gap-2">
                        <IconFileText /> Розпізнати текст
                    </motion.button>
                    
                    <div className="flex items-center gap-2 my-0.5">
                        <hr className="flex-1 border-blue-200 dark:border-blue-800/50" />
                        <span className="text-[10px] uppercase font-bold text-blue-400 dark:text-blue-600">або</span>
                        <hr className="flex-1 border-blue-200 dark:border-blue-800/50" />
                    </div>

                    <label className="w-full py-2.5 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 transition shadow-sm flex items-center justify-center gap-2 cursor-pointer text-sm border border-emerald-500">
                        <IconExcel /> Завантажити .xls
                        <input type="file" accept=".xls,.xlsx,.csv" className="hidden" onChange={handleExcelUpload} />
                    </label>
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
              <h2 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 mb-1 flex items-center gap-2"><IconEdit /> Редагування даних</h2><p className="text-slate-500 dark:text-slate-400 text-sm">Внесення змін до листа за {editingPayslip.monthName} {editingPayslip.year}</p>
            </div>
          )}

          <form onSubmit={handleFormSubmit} className="space-y-6">
            <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
              <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">Період</h3>
              <div className="grid grid-cols-2 gap-4 md:gap-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Місяць</label>
                  <select value={monthIdx} onChange={e => { setMonthIdx(Number(e.target.value)); markDirty(); }} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-sm md:text-base">
                    {MONTH_NAMES.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Рік</label>
                  <input type="number" value={year} onChange={e => { setYear(e.target.value); markDirty(); }} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 font-mono rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-sm md:text-base" required />
                </div>
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800 p-3 md:p-6 rounded-2xl shadow-sm border border-emerald-200 dark:border-emerald-900/50 transition-colors">
              <div className="flex justify-between items-center mb-4 px-2 md:px-0">
                <h3 className="text-base md:text-lg font-bold text-emerald-800 dark:text-emerald-400">Нараховано</h3><button type="button" onClick={handleAddAccrual} className="flex items-center gap-1 text-sm font-medium text-emerald-700 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-900/30 px-3 py-1.5 rounded-lg hover:bg-emerald-100 dark:hover:bg-emerald-900/50 transition"><IconPlus /> Додати</button>
              </div>
              <div className="space-y-3">
                <AnimatePresence>
                  {accruals.map((item, idx) => (
                    <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, height: 0, overflow: 'hidden' }} key={item.id} className="flex flex-col md:flex-row gap-2 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 transition-colors">
                      <input type="text" placeholder="Вид оплати" value={item.name} onChange={e => { const newArr = [...accruals]; newArr[idx].name = e.target.value; setAccruals(newArr); markDirty(); }} className="w-full md:flex-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-lg p-2.5 text-sm transition-colors" required />
                      <div className="grid grid-cols-2 gap-2 md:flex md:w-auto">
                        <input type="text" placeholder="% (напр. 100%)" value={item.percent || ''} onChange={e => { const newArr = [...accruals]; newArr[idx].percent = e.target.value; setAccruals(newArr); markDirty(); }} className="w-full md:w-24 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 font-mono rounded-lg p-2.5 text-sm transition-colors" />
                        <input type="number" placeholder="Дні" value={item.days} onChange={e => { const newArr = [...accruals]; newArr[idx].days = e.target.value; setAccruals(newArr); markDirty(); }} className="w-full md:w-16 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 font-mono rounded-lg p-2.5 text-sm transition-colors" />
                        <input type="text" placeholder="Год" value={item.hours} onChange={e => { const newArr = [...accruals]; newArr[idx].hours = e.target.value; setAccruals(newArr); markDirty(); }} className="w-full md:w-20 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 font-mono rounded-lg p-2.5 text-sm transition-colors" />
                        <input type="number" step="0.01" inputMode="decimal" placeholder="Сума ₴" value={item.amount} onChange={e => { const newArr = [...accruals]; newArr[idx].amount = e.target.value; setAccruals(newArr); markDirty(); }} className="w-full md:w-28 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-emerald-700 dark:text-emerald-400 font-mono rounded-lg p-2.5 text-sm font-bold transition-colors" required />
                      </div>
                      <button type="button" onClick={() => removeAccrual(item.id)} className="w-full md:w-auto p-2.5 flex justify-center text-rose-500 bg-rose-50 hover:bg-rose-100 dark:bg-rose-900/20 dark:hover:bg-rose-900/40 rounded-lg transition mt-2 md:mt-0"><IconTrash /></button>
                    </motion.div>
                  ))}
                </AnimatePresence>
              </div>
            </div>

            <div className={`bg-white dark:bg-slate-800 p-3 md:p-6 rounded-2xl shadow-sm border transition-colors ${showTaxWarning ? 'border-amber-300 dark:border-amber-700/50' : 'border-rose-200 dark:border-slate-700'}`}>
              <div className="flex justify-between items-center mb-4 px-2 md:px-0">
                <div className="flex items-center gap-2">
                  <h3 className="text-base md:text-lg font-bold text-rose-800 dark:text-rose-400">Утримано</h3>
                  {showTaxWarning && <span className="text-amber-600 bg-amber-50 dark:bg-amber-900/20 p-1 rounded" title="Введені податки не збігаються з розрахунковими"><IconAlert /></span>}
                </div>
                <button type="button" onClick={handleAddDeduction} className="flex items-center gap-1 text-sm font-medium text-rose-700 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/30 px-3 py-1.5 rounded-lg hover:bg-rose-100 dark:hover:bg-rose-900/50 transition"><IconPlus /> Додати</button>
              </div>
              
              {showTaxWarning && (
                <div className="mb-4 text-xs text-amber-600 dark:text-amber-400 px-2">
                  <strong>Підказка:</strong> Орієнтовний ПДФО — <span className="font-mono">{formatCurrency(calcPdfo)}</span>, ВЗ — <span className="font-mono">{formatCurrency(calcVz)}</span>.
                </div>
              )}

              <div className="space-y-3">
                <AnimatePresence>
                  {deductions.map((item, idx) => {
                    const isTax = (item.name || '').toLowerCase().includes('податок') || (item.name || '').toLowerCase().includes('військов');
                    return (
                    <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, height: 0, overflow: 'hidden' }} key={item.id} className="flex flex-col md:flex-row gap-2 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700/50 transition-colors">
                      <input type="text" placeholder="Вид утримання" value={item.name} onChange={e => { const newArr = [...deductions]; newArr[idx].name = e.target.value; setDeductions(newArr); markDirty(); }} className="w-full md:flex-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-lg p-2.5 text-sm transition-colors" required />
                      <input type="number" step="0.01" inputMode="decimal" placeholder="Сума ₴" value={item.amount} onChange={e => { const newArr = [...deductions]; newArr[idx].amount = e.target.value; setDeductions(newArr); markDirty(); }} className={`w-full md:w-32 bg-white dark:bg-slate-800 border rounded-lg p-2.5 text-sm font-bold font-mono transition-colors ${showTaxWarning && isTax ? 'border-amber-300 dark:border-amber-600 text-amber-700 dark:text-amber-400' : 'border-slate-200 dark:border-slate-700 text-rose-700 dark:text-rose-400'}`} required />
                      <button type="button" onClick={() => removeDeduction(item.id)} className="w-full md:w-auto p-2.5 flex justify-center text-rose-500 bg-rose-50 hover:bg-rose-100 dark:bg-rose-900/20 dark:hover:bg-rose-900/40 rounded-lg transition mt-2 md:mt-0"><IconTrash /></button>
                    </motion.div>
                  )})}
                </AnimatePresence>
              </div>
            </div>

            <div className={`sticky bottom-4 z-40 bg-slate-800 dark:bg-slate-900 text-white p-4 rounded-2xl shadow-xl border mt-6 md:hidden ${currentNet < 0 ? 'border-rose-500 ring-2 ring-rose-500/50' : 'border-slate-700'}`}>
              <div className="flex justify-between items-center text-sm mb-1">
                <span className="text-slate-400">Нараховано:</span>
                <span className="text-emerald-400 font-bold font-mono tracking-tight">{formatCurrency(currentAccrued, 'UAH')}</span>
              </div>
              <div className="flex justify-between items-center text-sm mb-2 border-b border-slate-700 pb-2">
                <span className="text-slate-400">Утримано:</span>
                <span className="text-rose-400 font-bold font-mono tracking-tight">-{formatCurrency(currentDeducted, 'UAH')}</span>
              </div>
              <div className="flex justify-between items-center">
                <span className="font-bold text-slate-200">Попередньо до виплати:</span>
                <span className={`text-lg font-black font-mono tracking-tight ${currentNet < 0 ? 'text-rose-400' : 'text-white'}`}>{formatCurrency(currentNet, 'UAH')}</span>
              </div>
            </div>

            <div className="flex flex-col md:flex-row justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-700">
              <motion.button whileTap={{ scale: 0.95 }} type="button" onClick={() => { if(editingPayslip) setEditingPayslip(null); handleTabChange('dashboard'); }} className="w-full md:w-auto px-6 py-3 font-medium text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 border border-transparent dark:border-slate-700 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition">Скасувати</motion.button>
              <motion.button whileTap={{ scale: 0.95 }} type="submit" className={`w-full md:w-auto px-8 py-3 font-bold text-white rounded-xl transition shadow-md flex items-center justify-center gap-2 ${currentNet < 0 ? 'bg-rose-500 hover:bg-rose-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                {currentNet < 0 ? <IconAlert /> : <IconCheck />} Зберегти
              </motion.button>
            </div>
          </form>
        </motion.div>
      );
    };

    const Layout = () => {
      const { theme, toggleTheme, isPrivateMode, togglePrivateMode, activeTab, handleTabChange, pendingTab, confirmTabChange, cancelTabChange, dbData, setDbData, generateAndDownloadJSONFile, showToast, hasUnexportedChanges, clearAllData, isMobileMenuOpen, setIsMobileMenuOpen } = useSalaryContext();
      const [isRestoring, setIsRestoring] = useState(false); const [showClearConfirm, setShowClearConfirm] = useState(false); const [isDragging, setIsDragging] = useState(false); const backupInputRef = useRef(null);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && showClearConfirm) setShowClearConfirm(false);
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [showClearConfirm]);

      const processImportedFile = (file) => {
        setIsRestoring(true); const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (Array.isArray(importedData)) {
              const migratedData = importedData.map(item => {
                 if (item.id && item.id.includes('.')) { const mIdx = MONTH_NAMES.indexOf(item.monthName); const yearNum = item.year.toString().length === 2 ? `20${item.year}` : item.year; return { ...item, id: `${yearNum}-${String(mIdx + 1).padStart(2, '0')}`, month: mIdx + 1, year: Number(yearNum) }; }
                 return item;
              });
              setDbData(migratedData); showToast("Дані успішно імпортовано!", "success"); handleTabChange('dashboard');
            } else { showToast("Очікується масив даних.", "error"); }
          } catch (err) { showToast("Помилка. Це не валідний .json", "error"); } finally { setIsRestoring(false); if (backupInputRef.current) backupInputRef.current.value = ''; }
        };
        reader.readAsText(file);
      };

      const handleImportBackup = (e) => { const file = e.target.files[0]; if (!file) return; processImportedFile(file); };
      const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); if (!e.currentTarget.contains(e.relatedTarget)) setIsDragging(false); };
      const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); const file = e.dataTransfer.files?.[0]; if (file && file.name.endsWith('.json')) processImportedFile(file); else if (file) showToast("Будь ласка, завантажте файл .json", "error"); };

      return (
        <div className="h-screen flex flex-col md:flex-row bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300 relative" onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}>
          <AnimatePresence>
            {isDragging && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="absolute inset-0 z-[100] bg-blue-600/90 backdrop-blur-sm flex flex-col items-center justify-center text-white border-8 border-blue-400 border-dashed m-4 rounded-3xl">
                <div className="w-24 h-24 mb-6 animate-bounce text-white flex items-center justify-center [&>svg]:w-full [&>svg]:h-full"><IconDatabase /></div><h2 className="text-3xl md:text-4xl font-bold mb-3 text-center px-4">Відпустіть файл тут</h2><p className="text-base md:text-lg text-blue-100 text-center px-4">щоб імпортувати базу даних</p>
              </motion.div>
            )}
          </AnimatePresence>

          <div className="md:hidden bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex items-center justify-between z-30">
            <div className="flex items-center space-x-2"><div className="bg-blue-600 p-1.5 rounded-lg text-white"><IconWallet /></div><h1 className="text-lg font-bold">SalaryHub</h1></div>
            <div className="flex items-center gap-2"><button onClick={toggleTheme} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">{theme === 'dark' ? <IconSun /> : <IconMoon />}</button><button onClick={togglePrivateMode} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">{isPrivateMode ? <IconEyeOff /> : <IconEye />}</button><button onClick={() => setIsMobileMenuOpen(true)} className="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg"><IconMenu /></button></div>
          </div>

          <AnimatePresence>
            {pendingTab && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4"><motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.95, opacity: 0 }} className="bg-white/95 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-2xl max-w-md w-full p-6 border border-white/20 dark:border-slate-700/50"><div className="flex items-center gap-3 text-amber-600 dark:text-amber-500 mb-4"><div className="bg-amber-100 dark:bg-amber-900/30 p-2 rounded-full"><IconAlert /></div><h3 className="text-xl font-bold">Незбережені дані</h3></div><p className="text-slate-600 dark:text-slate-300 mb-6">Ви внесли зміни у форму. Якщо ви перейдете на іншу вкладку, незбережені дані будуть втрачені.</p><div className="flex justify-end gap-3 flex-wrap"><button onClick={cancelTabChange} className="px-4 py-2 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">Залишитися</button><button onClick={confirmTabChange} className="px-4 py-2 bg-rose-500 text-white font-bold rounded-xl hover:bg-rose-600 transition shadow-sm">Вийти</button></div></motion.div></motion.div>
            )}
            {showClearConfirm && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4"><motion.div initial={{ scale: 0.95, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} exit={{ scale: 0.95, opacity: 0 }} className="bg-white/95 dark:bg-slate-900/80 backdrop-blur-xl rounded-3xl shadow-2xl max-w-md w-full p-6 border border-white/20 dark:border-slate-700/50"><div className="flex items-center gap-3 text-rose-600 dark:text-rose-500 mb-4"><div className="bg-rose-100 dark:bg-rose-900/30 p-2 rounded-full"><IconAlert /></div><h3 className="text-xl font-bold">Очистити всі дані?</h3></div><p className="text-slate-600 dark:text-slate-300 mb-6">Ви збираєтесь видалити <b>всі розрахункові листи</b> з бази. Цю дію неможливо скасувати.</p><div className="flex justify-end gap-3 flex-wrap"><button onClick={() => setShowClearConfirm(false)} className="px-4 py-2 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">Скасувати</button><button onClick={() => { clearAllData(); setShowClearConfirm(false); }} className="px-4 py-2 bg-rose-600 text-white font-bold rounded-xl hover:bg-rose-700 transition shadow-sm">Очистити</button></div></motion.div></motion.div>
            )}
          </AnimatePresence>

          {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

          <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="p-5 md:p-6 flex items-center justify-between gap-2 md:mb-6">
              <div className="hidden md:flex items-center gap-2.5 min-w-0">
                <div className="bg-blue-600 p-2 rounded-lg text-white shrink-0"><IconWallet /></div>
                <h1 className="text-xl font-bold text-slate-800 dark:text-slate-100 truncate">SalaryHub</h1>
              </div>
              <div className="md:hidden flex items-center w-full justify-between"><div className="flex items-center space-x-2"><div className="bg-blue-600 p-1.5 rounded-lg text-white"><IconWallet /></div><span className="font-bold text-lg">Меню</span></div><button onClick={() => setIsMobileMenuOpen(false)} className="p-2 bg-slate-100 dark:bg-slate-700 rounded-full"><IconX /></button></div>
              <div className="hidden md:flex items-center gap-1.5 shrink-0">
                <button onClick={toggleTheme} className="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 bg-slate-50 dark:bg-slate-700/50 rounded-lg transition-colors">{theme === 'dark' ? <IconSun /> : <IconMoon />}</button>
                <button onClick={togglePrivateMode} className="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 bg-slate-50 dark:bg-slate-700/50 rounded-lg transition-colors">{isPrivateMode ? <IconEyeOff /> : <IconEye />}</button>
              </div>
            </div>
            
            <nav className="space-y-2 flex-1 flex flex-col px-4 md:px-6 overflow-y-auto no-scrollbar">
              <div className="space-y-2">
                <motion.button whileTap={{ scale: 0.95 }} onClick={() => handleTabChange('dashboard')} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-left ${activeTab === 'dashboard' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                  <span className="shrink-0"><IconActivity /></span>
                  <span className="truncate whitespace-normal leading-tight">Головна</span>
                </motion.button>
                <motion.button whileTap={{ scale: 0.95 }} onClick={() => { if (dbData.length > 0) handleTabChange('payslips'); }} disabled={dbData.length === 0} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-left ${activeTab === 'payslips' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-semibold' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 disabled:opacity-50 disabled:cursor-not-allowed'}`}>
                  <span className="shrink-0"><IconFileText /></span>
                  <span className="truncate whitespace-normal leading-tight">Розрахункові листи</span>
                </motion.button>
                <div className="pt-4 mt-4 border-t border-slate-100 dark:border-slate-700">
                  <motion.button whileTap={{ scale: 0.95 }} onClick={() => handleTabChange('add')} className={`w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-xl font-bold transition-all ${activeTab === 'add' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 dark:bg-slate-900/50 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700/80'}`}>
                    <span className="shrink-0"><IconPlus /></span>
                    <span className="truncate whitespace-normal leading-tight">Додати дані</span>
                  </motion.button>
                </div>
              </div>
              <div className="mt-auto pt-8 pb-6">
                <div className="text-xs font-semibold text-slate-400 dark:text-slate-500 mb-3 px-2 uppercase tracking-wider">Файли та Дані</div>
                
                <button onClick={() => generateAndDownloadJSONFile(dbData)} disabled={dbData.length === 0} className={`w-full flex items-center justify-between px-4 py-2.5 rounded-lg text-sm font-medium transition-all ${hasUnexportedChanges ? 'bg-amber-100 dark:bg-amber-900/30 text-amber-800 dark:text-amber-400 hover:bg-amber-200 dark:hover:bg-amber-900/50 shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50 disabled:opacity-50 disabled:cursor-not-allowed'}`}>
                  <div className="flex items-center gap-3"><IconDownload /> Експорт .json</div>
                  {hasUnexportedChanges && <span className="flex h-2.5 w-2.5 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span></span>}
                </button>
                
                <label className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all cursor-pointer mt-1 ${isRestoring ? 'text-blue-400 bg-blue-50 dark:bg-blue-900/30' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                  {isRestoring ? <div className="w-5 h-5 border-2 border-current border-t-transparent rounded-full animate-spin"></div> : <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>} {isRestoring ? 'Імпорт...' : 'Імпорт .json'}
                  <input type="file" accept=".json" className="hidden" onChange={handleImportBackup} ref={backupInputRef} disabled={isRestoring} />
                </label>
                
                <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700">
                  <button onClick={() => setShowClearConfirm(true)} disabled={dbData.length === 0} className="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"><IconTrash /> Очистити базу</button>
                </div>
              </div>
            </nav>
          </aside>

          <main className="flex-1 p-4 md:p-8 overflow-y-auto no-scrollbar relative">
            <AnimatePresence mode="wait">
              {activeTab === 'dashboard' && <DashboardView key="dashboard" />}
              {activeTab === 'payslips' && <PayslipView key="payslips" />}
              {activeTab === 'add' && <AddPayslipView key="add" />}
            </AnimatePresence>
          </main>
        </div>
      );
    };

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, errorInfo: null }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) { 
        console.error("Критична помилка додатку:", error, errorInfo); 
        this.setState({ errorInfo });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center bg-slate-100 dark:bg-slate-900 p-4 font-sans">
              <div className="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl max-w-md w-full border border-rose-200 dark:border-rose-900/50 text-center">
                <div className="w-16 h-16 bg-rose-100 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                </div>
                <h2 className="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-2">Ой, щось пішло не так</h2>
                <p className="text-slate-500 dark:text-slate-400 mb-6">Додаток зіткнувся з непередбачуваною помилкою. Спробуйте оновити сторінку.</p>
                <div className="space-y-3">
                  <button onClick={() => window.location.reload()} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Оновити сторінку</button>
                  <button onClick={() => { window.localStorage.removeItem('salaryHubData'); window.location.reload(); }} className="w-full py-3 bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-400 font-bold rounded-xl hover:bg-rose-100 dark:hover:bg-rose-900/40 transition">Скинути всі дані та перезавантажити</button>
                </div>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const App = () => { 
      return (
        <ErrorBoundary>
          <SalaryProvider><Layout /></SalaryProvider>
        </ErrorBoundary>
      ); 
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
