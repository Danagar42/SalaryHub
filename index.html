<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SalaryHub - Розрахункові листи (з підтримкою Excel)</title>
  
  <!-- Завантаження Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'], 
          }
        }
      }
    }
  </script>
  
  <!-- Завантаження React та ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Завантаження Framer Motion, Recharts, Confetti та XLSX (SheetJS) -->
  <script src="https://unpkg.com/framer-motion@11.0.8/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/recharts@2.12.3/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- ДОДАНО: Бібліотека для парсингу Excel файлів локально -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700;800&display=swap');
    
    body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .font-mono { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, createContext, useContext, useCallback } = React;
    const { motion, AnimatePresence, animate } = window.Motion;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer, PieChart, Pie, Cell, LabelList, Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis, ReferenceLine } = window.Recharts;

    const IconWallet = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
    const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
    // ДОДАНО: Іконка Excel
    const IconExcel = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2l2 3 2-3h2l-3 4 3 4h-2l-2-3-2 3H8l3-4-3-4z"/></svg>;
    const IconMoneyStack = () => <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 2h16"/><path d="M3 5h18"/><rect x="2" y="8" width="20" height="12" rx="2"/><circle cx="12" cy="14" r="2"/><path d="M6 14h.01"/><path d="M18 14h.01"/></svg>;
    const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const IconDatabase = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const IconMoon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const IconSun = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;
    const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
    const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;
    const IconAreaChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>;
    const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
    const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;

    const MONTH_NAMES = ["Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень", "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"];

    let idCounter = 0;
    const generateId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      idCounter++;
      return Date.now().toString(36) + Math.random().toString(36).substring(2) + idCounter;
    };

    const formatCurrency = (amount, currencyCode = 'UAH') => {
      const roundedAmount = Math.round(amount || 0);
      try {
        return new Intl.NumberFormat('uk-UA', { 
          style: 'currency', 
          currency: currencyCode,
          minimumFractionDigits: 0,
          maximumFractionDigits: 0
        }).format(roundedAmount);
      } catch (e) {
        return `${roundedAmount} ${currencyCode}`;
      }
    };

    const getTextColorGradient = (value, min, max, theme) => {
      if (max === min) return { color: theme === 'dark' ? '#34d399' : 'hsl(120, 75%, 45%)' }; 
      const percent = (value - min) / (max - min);
      const lightness = theme === 'dark' ? 65 : 45;
      return { color: `hsl(${percent * 120}, 75%, ${lightness}%)` }; 
    };

    const useLocalStorage = (key, initialValue) => {
      const [storedValue, setStoredValue] = useState(() => {
        try {
          const item = window.localStorage.getItem(key);
          if (!item) return initialValue;
          const parsed = JSON.parse(item);
          if (key === 'salaryHubData' && Array.isArray(parsed)) {
            return parsed.map(item => {
              if (item.id && item.id.includes('.')) {
                const mIdx = MONTH_NAMES.indexOf(item.monthName);
                const monthStr = String(mIdx + 1).padStart(2, '0');
                const yearNum = item.year.toString().length === 2 ? `20${item.year}` : item.year;
                return { ...item, id: `${yearNum}-${monthStr}`, month: mIdx + 1, year: Number(yearNum) };
              }
              return item;
            });
          }
          return parsed;
        } catch (error) {
          console.error("Error reading localStorage", error);
          return initialValue;
        }
      });

      const setValue = (value) => {
        try {
          const valueToStore = value instanceof Function ? value(storedValue) : value;
          setStoredValue(valueToStore);
          window.localStorage.setItem(key, JSON.stringify(valueToStore));
        } catch (error) {
          console.error("Error setting localStorage", error);
        }
      };

      return [storedValue, setValue];
    };

    const useExchangeRates = (dbData) => {
      const [historicalRates, setHistoricalRates] = useLocalStorage(`salaryHubRates_USD_Persist`, {});
      const [liveRateState, setLiveRateState] = useLocalStorage(`salaryHubLiveRate_USD_Persist`, { rate: null, timestamp: null });
      const [isLoadingRate, setIsLoadingRate] = useState(true);
      const [isOfflineRate, setIsOfflineRate] = useState(false);

      useEffect(() => {
        let isMounted = true;
        const fetchLive = async () => {
          setIsLoadingRate(true);
          setIsOfflineRate(false);
          try {
            const res = await fetch(`https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&json`);
            if (!res.ok) throw new Error('Network error');
            const data = await res.json();
            if (isMounted && data?.[0]) {
              setLiveRateState({ rate: data[0].rate, timestamp: Date.now() });
            }
          } catch (e) {
            if (isMounted) setIsOfflineRate(true);
          } finally {
            if (isMounted) setIsLoadingRate(false);
          }
        };
        fetchLive();
        return () => { isMounted = false; };
      }, []);

      useEffect(() => {
        if (!dbData || dbData.length === 0) return;
        let isMounted = true;
        
        const fetchHistorical = async () => {
          let updated = false;
          const currentRates = { ...historicalRates };

          for (const item of dbData) {
            if (!isMounted) break;
            if (currentRates[item.id]) continue;
            
            try {
              const dateStr = `${item.id.replace('-', '')}01`; 
              const res = await fetch(`https://bank.gov.ua/NBUStatService/v1/statdirectory/exchange?valcode=USD&date=${dateStr}&json`);
              if (!res.ok) continue;
              const data = await res.json();
              
              if (data?.[0]) {
                currentRates[item.id] = data[0].rate;
                updated = true;
              }
            } catch (e) {
              console.warn(`Failed to fetch rate for ${item.id}`, e);
            }
          }
          
          if (updated && isMounted) {
            setHistoricalRates(currentRates);
          }
        };
        
        fetchHistorical();
        return () => { isMounted = false; };
      }, [dbData]);

      return { 
        liveRate: liveRateState.rate, 
        rateTimestamp: liveRateState.timestamp,
        historicalRates, 
        isLoadingRate,
        isOfflineRate
      };
    };

    const ParserModule = {
      accrualKeywords: ['оклад', 'премі', 'відпустк', 'лікарнян', 'доплат', 'надбавк', 'надб', 'компенсаці', 'індексаці', 'оплат', 'допомог', 'відрядж', 'мобілізован', 'матеріал', 'інші'],
      deductionKeywords: ['аванс', 'податок', 'збір', 'внеск', 'виплачено', 'виплат', 'утриманн', 'перерахуванн', 'картк', 'банк', 'проф', 'алімент', 'борг', 'зсу', 'благодійн', 'виконавч', 'о/р', 'вз'],
      
      isAmount: (val) => {
        if (val == null || val === '') return false;
        const str = String(val).replace(/[\s\u00A0]+/g, '').replace(',', '.');
        if (/^-?\d+(\.\d+)?$/.test(str)) {
          const num = Math.abs(parseFloat(str));
          if (/^(19|20)\d{4}$/.test(str.replace('-', ''))) return false; // Ігноруємо дати формату YYYYMM
          return num > 0;
        }
        return false;
      },

      parseNum: (val) => {
        const str = String(val).replace(/[\s\u00A0]+/g, '').replace(',', '.');
        return Math.abs(parseFloat(str)) || 0;
      },

      parseGrid: (rows) => {
        const accruals = [];
        const deductions = [];
        let period = null;

        const isAccrual = (c) => { 
          const lower = String(c).toLowerCase(); 
          if (lower.match(/зсу|благодійн|виплат|утриман|дохід|разом/)) return false; 
          return ParserModule.accrualKeywords.some(kw => lower.includes(kw)); 
        };
        
        const isDeduction = (c) => { 
          const lower = String(c).toLowerCase(); 
          return ParserModule.deductionKeywords.some(kw => lower.includes(kw)) && !lower.includes('разом'); 
        };

        // Шукаємо період
        for (const row of rows) {
          for (const cell of row) {
            if (typeof cell === 'string') {
              const match = cell.match(/за\s*(\d{1,2})\.(\d{4})/i) || cell.match(/(\d{1,2})\.(\d{4})\s*р/i); 
              if (match) period = { monthIdx: parseInt(match[1], 10) - 1, year: parseInt(match[2], 10) };
            }
          }
        }

        // Обробка рядків
        rows.forEach(row => {
          if (!Array.isArray(row)) return;
          const cleanRow = row.map(c => typeof c === 'string' ? c.trim() : c).filter(c => c != null && c !== '');
          if (cleanRow.length === 0) return;

          let accIdx = cleanRow.findIndex(c => typeof c === 'string' && isAccrual(c));
          let dedIdx = cleanRow.findIndex(c => typeof c === 'string' && isDeduction(c));

          if (accIdx !== -1) {
            let endLimit = (dedIdx !== -1 && dedIdx > accIdx) ? dedIdx : cleanRow.length;
            let slice = cleanRow.slice(accIdx + 1, endLimit);
            
            let amount = 0; let days = 0; let hours = '0:0';
            
            let hourCell = slice.find(c => typeof c === 'string' && c.includes(':'));
            if (hourCell) hours = String(hourCell).trim();

            let numberCandidates = slice.filter(ParserModule.isAmount).map(ParserModule.parseNum);
            if (numberCandidates.length > 0) {
              amount = Math.max(...numberCandidates); // Сума - зазвичай найбільше число
              if (numberCandidates.length > 1) {
                let smallest = Math.min(...numberCandidates);
                if (smallest <= 31 && smallest === Math.floor(smallest)) days = smallest; // Днi - найменше ціле число до 31
              }
            }

            if (amount > 0) {
              let name = String(cleanRow[accIdx]).replace(/^\d+[\.\s]*/, '').trim(); // Прибираємо ID, напр: "1 Посадовий" -> "Посадовий"
              if (name.toLowerCase().includes('надб') && name.toLowerCase().includes('стаж')) name = 'Надбавка за стаж в енергетиці';
              accruals.push({ id: generateId(), name, percent: '', days, hours, amount });
            }
          }

          if (dedIdx !== -1) {
            let slice = cleanRow.slice(dedIdx + 1);
            let amount = 0;
            
            let numberCandidates = slice.filter(ParserModule.isAmount).map(ParserModule.parseNum);
            if (numberCandidates.length > 0) amount = Math.max(...numberCandidates);

            if (amount > 0) {
              let name = String(cleanRow[dedIdx]).replace(/^\d+[\.\s]*/, '').trim();
              deductions.push({ id: generateId(), name, amount });
            }
          }
        });

        return { success: accruals.length > 0 || deductions.length > 0, accruals, deductions, period };
      },

      parseTextPayslip: (text) => {
        const lines = text.replace(/(={2,}|-{2,}|\*{2,}|\|)/g, ' ').split('\n');
        const rows = lines.map(line => {
          if (line.includes('\t')) return line.split('\t');
          // Розбиваємо текст на "колонки" за двома пробілами або крапкою з комою
          return line.split(/\s{2,}|;/);
        });
        return ParserModule.parseGrid(rows);
      }
    };

    class WidgetErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }
      componentDidCatch(error, errorInfo) { console.error("Widget Error:", error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="h-64 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-rose-200 dark:border-rose-900/50 p-4 text-center">
              <IconAlert />
              <p className="mt-2 text-sm font-medium">Не вдалося завантажити віджет.</p>
              <button onClick={() => this.setState({ hasError: false })} className="mt-2 text-xs text-blue-500 hover:underline">Спробувати знову</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const pageVariants = { initial: { opacity: 0, y: 15 }, animate: { opacity: 1, y: 0, transition: { duration: 0.3 } }, exit: { opacity: 0, y: -15, transition: { duration: 0.2 } } };
    const tableContainerVariants = { hidden: { opacity: 0 }, show: { opacity: 1, transition: { staggerChildren: 0.05 } }};
    const tableRowVariants = { hidden: { opacity: 0, y: 10 }, show: { opacity: 1, y: 0 }};

    const SalaryContext = createContext(null);
    const useSalaryContext = () => useContext(SalaryContext);

    const SalaryProvider = ({ children }) => {
      const [theme, setTheme] = useLocalStorage('salaryHubTheme', 'light');
      const [isPrivateMode, setIsPrivateMode] = useLocalStorage('salaryHubPrivacy', false);
      
      const [hasSeenImportHint, setHasSeenImportHint] = useLocalStorage('salaryHub_hasSeenImportHint', false);
      
      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedMonthId, setSelectedMonthId] = useState(null);
      
      const [isFormDirty, setIsFormDirty] = useState(false);
      const [pendingTab, setPendingTab] = useState(null);
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const [editingPayslip, setEditingPayslip] = useState(null);
      
      const [_dbData, _setDbData] = useLocalStorage('salaryHubData', []);
      const [hasUnexportedChanges, setHasUnexportedChanges] = useState(false);
      
      const dbData = _dbData;
      
      const setDbData = useCallback((newData) => {
        _setDbData(newData);
        setHasUnexportedChanges(true);
      }, [_setDbData]);

      const { liveRate, rateTimestamp, historicalRates, isLoadingRate, isOfflineRate } = useExchangeRates(dbData);
      
      const [toasts, setToasts] = useState([]);

      const showToast = useCallback((message, type = 'success') => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      }, []);

      useEffect(() => {
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');
      const togglePrivateMode = () => setIsPrivateMode(prev => !prev);

      const handleTabChange = useCallback((newTab, force = false) => {
        if (!force && isFormDirty && newTab !== activeTab) { setPendingTab(newTab); } 
        else {
          if (newTab !== 'add') setEditingPayslip(null);
          setActiveTab(newTab);
          setIsMobileMenuOpen(false);
        }
      }, [isFormDirty, activeTab]);

      const confirmTabChange = useCallback(() => {
        setIsFormDirty(false); setEditingPayslip(null); setActiveTab(pendingTab); setPendingTab(null); setIsMobileMenuOpen(false);
      }, [pendingTab]);

      const cancelTabChange = useCallback(() => setPendingTab(null), []);

      const startEditing = useCallback((id) => {
        const slipToEdit = dbData.find(d => d.id === id);
        if (slipToEdit) { setEditingPayslip(slipToEdit); handleTabChange('add', true); }
      }, [dbData, handleTabChange]);

      const clearAllData = useCallback(() => {
        setDbData([]); setHasUnexportedChanges(false); showToast("Всі дані успішно видалено", "success"); handleTabChange('dashboard', true);
      }, [setDbData, showToast, handleTabChange]);

      const generateDummyData = useCallback(() => {
        const dummySlips = [
            { id: '2026-03', month: 3, year: 2026, monthName: 'Березень', accruals: [{id: generateId(), name: 'Посадовий оклад', amount: 32000, days: 21, hours: '168:0'}, {id: generateId(), name: 'Премія за результатами роботи', percent: '20%', amount: 6400, days: 0, hours: '0:0'}], deductions: [{id: generateId(), name: 'Плановий аванс', amount: 15000}, {id: generateId(), name: 'Податок з доходів', amount: 6912}, {id: generateId(), name: 'Військовий збір', amount: 576}] },
            { id: '2026-02', month: 2, year: 2026, monthName: 'Лютий', accruals: [{id: generateId(), name: 'Посадовий оклад', amount: 32000, days: 20, hours: '160:0'}, {id: generateId(), name: 'Щорічна відпустка', amount: 8500, days: 5, hours: '0:0'}], deductions: [{id: generateId(), name: 'Плановий аванс', amount: 12000}, {id: generateId(), name: 'Податок з доходів', amount: 7290}, {id: generateId(), name: 'Військовий збір', amount: 607.5}] },
            { id: '2026-01', month: 1, year: 2026, monthName: 'Січень', accruals: [{id: generateId(), name: 'Посадовий оклад', amount: 32000, days: 22, hours: '176:0'}, {id: generateId(), name: 'Премія річна', amount: 15000, days: 0, hours: '0:0'}], deductions: [{id: generateId(), name: 'Плановий аванс', amount: 15000}, {id: generateId(), name: 'Податок з доходів', amount: 8460}, {id: generateId(), name: 'Військовий збір', amount: 705}] },
            { id: '2025-03', month: 3, year: 2025, monthName: 'Березень', accruals: [{id: generateId(), name: 'Посадовий оклад', amount: 28000, days: 21, hours: '168:0'}], deductions: [{id: generateId(), name: 'Плановий аванс', amount: 12000}, {id: generateId(), name: 'Податок з доходів', amount: 5040}, {id: generateId(), name: 'Військовий збір', amount: 420}] },
        ];
        setDbData(dummySlips);
        showToast("Демо-дані завантажено! Досліджуйте.", "success");
        handleTabChange('dashboard');
      }, [setDbData, showToast, handleTabChange]);

      useEffect(() => {
        const sortedData = [...dbData].sort((a, b) => a.id.localeCompare(b.id));
        if (sortedData.length > 0 && (!selectedMonthId || !sortedData.find(d => d.id === selectedMonthId))) {
          setSelectedMonthId(sortedData[sortedData.length - 1].id);
        }
      }, [dbData, selectedMonthId]);

      const summaryData = useMemo(() => {
        const sortedDbData = [...dbData].sort((a, b) => b.id.localeCompare(a.id)); 
        
        return sortedDbData.map((month, index, array) => {
          const validAccruals = month.accruals.filter(a => !a.name.toLowerCase().match(/виплачен[оі].*відпускн/)).map(a => {
               if (a.name.toLowerCase().includes('надб') && a.name.toLowerCase().includes('стаж') && a.name.toLowerCase().includes('енерг')) return { ...a, name: 'Надбавка за стаж в енергетиці' };
               return a;
          });
          const validDeductions = month.deductions.filter(d => !d.name.toLowerCase().match(/виплачен[оі].*відпускн/));

          const totalAccrued = validAccruals.reduce((sum, item) => sum + Number(item.amount), 0);
          const totalDeducted = validDeductions.reduce((sum, item) => sum + Number(item.amount), 0);
          
          const totalBonuses = validAccruals
            .filter(a => a.name.toLowerCase().includes('премі') && !a.name.toLowerCase().includes('за рік') && !a.name.toLowerCase().includes('річн'))
            .reduce((sum, item) => sum + Number(item.amount), 0);
            
          const otherBonuses = validAccruals
            .filter(a => a.name.toLowerCase().includes('матеріал') || a.name.toLowerCase().includes('допомог'))
            .reduce((sum, item) => sum + Number(item.amount), 0);

          let prevMonthVacationPayout = 0; let calculatedBonusPercent = null; let bonusPercentNumeric = 0;

          if (index < array.length - 1) {
            const prevMonth = array[index + 1];
            const currDate = new Date(month.year, month.month - 1); const prevDate = new Date(prevMonth.year, prevMonth.month - 1);
            const diffMonths = (currDate.getFullYear() - prevDate.getFullYear()) * 12 + (currDate.getMonth() - prevDate.getMonth());
            
            if (diffMonths === 1) {
              const vacationInDeductions = prevMonth.deductions.filter(d => d.name.toLowerCase().match(/виплачен[оі].*відпускн/)).reduce((sum, item) => sum + Number(item.amount), 0);
              const vacationInAccruals = prevMonth.accruals.filter(a => a.name.toLowerCase().match(/виплачен[оі].*відпускн/)).reduce((sum, item) => sum + Number(item.amount), 0);
              prevMonthVacationPayout = vacationInDeductions + vacationInAccruals;

              if (totalBonuses > 0) {
                const prevOkladTotal = prevMonth.accruals.filter(a => a.name.toLowerCase().includes('оклад')).reduce((sum, item) => sum + Number(item.amount), 0);
                if (prevOkladTotal > 0) {
                  let percentVal = ((totalBonuses / prevOkladTotal) * 100); percentVal = Math.round(percentVal / 5) * 5;
                  bonusPercentNumeric = percentVal; calculatedBonusPercent = percentVal + '%';
                }
              }
            }
          }

          const advanceSum = validDeductions.filter(d => d.name.toLowerCase().match(/аванс/)).reduce((sum, item) => sum + Number(item.amount), 0);
          const explicitBankSum = validDeductions.filter(d => d.name.toLowerCase().match(/перерахування|банк|картк|о\/р/)).reduce((sum, item) => sum + Number(item.amount), 0);
          const taxes = validDeductions.filter(d => !d.name.toLowerCase().match(/аванс|перерахування|банк|картк|о\/р/)).reduce((sum, item) => sum + Number(item.amount), 0);
            
          const toBank = explicitBankSum > 0 ? explicitBankSum : (totalAccrued - totalDeducted);
          const netPay = advanceSum + toBank + prevMonthVacationPayout;
          
          let okladAmount = 0; let okladHours = 0; let stazhAmount = 0;
          
          validAccruals.forEach(a => {
            const lowerName = a.name.toLowerCase();
            if (lowerName.includes('оклад')) {
              okladAmount += Number(a.amount);
              if (a.hours) {
                const hoursStr = String(a.hours);
                if (hoursStr.includes(':')) { const parts = hoursStr.split(':'); okladHours += (parseInt(parts[0], 10) || 0) + ((parseInt(parts[1], 10) || 0) / 60); } 
                else { okladHours += parseFloat(hoursStr) || 0; }
              }
            }
            if (lowerName.includes('стаж в енергетиці')) stazhAmount += Number(a.amount);
          });
          const hourlyRate = okladHours > 0 ? ((okladAmount + stazhAmount) / okladHours) : 0;
          const hasVacation = validAccruals.some(a => a.name.toLowerCase().includes('щорічна відпуст'));

          const actualRate = historicalRates[month.id] || 40.0;
          const hourlyRateForeign = hourlyRate / actualRate;
          
          const calcPdfo = totalAccrued * 0.18;
          const vzRate = month.year <= 2024 ? 0.015 : 0.05; 
          const calcVz = totalAccrued * vzRate;
          
          let actualPdfo = 0;
          let actualVz = 0;
          
          validDeductions.forEach(d => {
            const lowerName = d.name.toLowerCase();
            if (lowerName.includes('податок') || lowerName.includes('пдфо')) actualPdfo += Number(d.amount);
            if (lowerName.includes('військов') || lowerName.includes('вз')) actualVz += Number(d.amount);
          });
          
          const pdfoDiff = Math.abs(actualPdfo - calcPdfo);
          const vzDiff = Math.abs(actualVz - calcVz);
          const taxWarnings = [];
          
          if (actualPdfo > 0 && pdfoDiff > 5) taxWarnings.push(`ПДФО: очікується ~${formatCurrency(calcPdfo)}, вказано ${formatCurrency(actualPdfo)}`);
          if (actualVz > 0 && vzDiff > 5) taxWarnings.push(`ВЗ: очікується ~${formatCurrency(calcVz)} (${(vzRate*100).toFixed(1)}%), вказано ${formatCurrency(actualVz)}`);

          return { 
            ...month, accruals: validAccruals, deductions: validDeductions,
            totalAccrued, totalDeducted, taxes, netPay, toBank, advanceSum, prevMonthVacationPayout, 
            totalBonuses, otherBonuses, hasVacation, calculatedBonusPercent, bonusPercentNumeric, hourlyRate, hourlyRateForeign,
            foreignEquivalent: netPay / actualRate, exchangeRate: actualRate,
            taxWarnings
          };
        });
      }, [dbData, historicalRates]);

      const deletePayslip = useCallback((idToDelete) => {
        setDbData(prev => prev.filter(d => d.id !== idToDelete)); showToast("Розрахунковий лист видалено", "success");
      }, [setDbData, showToast]);

      useEffect(() => {
        const handleBeforeUnload = (e) => { if (hasUnexportedChanges) { e.preventDefault(); e.returnValue = 'У вас є неекспортовані зміни!'; } };
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [hasUnexportedChanges]);

      const generateAndDownloadJSONFile = useCallback(async (dataToExport) => {
        try {
          const jsonData = JSON.stringify(dataToExport, null, 2);
          if (window.showSaveFilePicker) {
            const handle = await window.showSaveFilePicker({ suggestedName: 'salaryData.json', types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }] });
            const writable = await handle.createWritable(); await writable.write(jsonData); await writable.close();
            setHasUnexportedChanges(false); showToast("Базу успішно експортовано!", "success");
          } else {
            const blob = new Blob([jsonData], { type: 'application/json;charset=utf-8' }); const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `salaryData.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            setHasUnexportedChanges(false); showToast("Базу завантажено!", "success");
          }
        } catch (err) {
          if (err.name !== 'AbortError') { showToast("Помилка збереження файлу", "error"); console.error(err); }
        }
      }, [showToast]);

      const contextValue = useMemo(() => ({
        theme, toggleTheme, isPrivateMode, togglePrivateMode,
        activeTab, handleTabChange, pendingTab, confirmTabChange, cancelTabChange,
        selectedMonthId, setSelectedMonthId, isFormDirty, setIsFormDirty, editingPayslip, setEditingPayslip, startEditing, clearAllData, generateDummyData,
        dbData, setDbData, summaryData, liveRate, rateTimestamp, isLoadingRate, isOfflineRate, historicalRates,
        generateAndDownloadJSONFile, deletePayslip, showToast, hasUnexportedChanges,
        isMobileMenuOpen, setIsMobileMenuOpen,
        hasSeenImportHint, setHasSeenImportHint
      }), [theme, isPrivateMode, activeTab, pendingTab, selectedMonthId, isFormDirty, editingPayslip, dbData, summaryData, liveRate, rateTimestamp, isLoadingRate, isOfflineRate, historicalRates, handleTabChange, confirmTabChange, cancelTabChange, setDbData, generateAndDownloadJSONFile, deletePayslip, showToast, hasUnexportedChanges, startEditing, clearAllData, generateDummyData, isMobileMenuOpen, hasSeenImportHint]);
      
      return (
        <SalaryContext.Provider value={contextValue}>
          {children}
          <div className="fixed bottom-6 right-6 z-[100] flex flex-col gap-2 pointer-events-none">
            <AnimatePresence>
              {toasts.map((toast) => (
                <motion.div key={toast.id} layout initial={{ opacity: 0, x: 50, scale: 0.9 }} animate={{ opacity: 1, x: 0, scale: 1 }} exit={{ opacity: 0, scale: 0.9, transition: { duration: 0.2 } }}
                  className={`pointer-events-auto flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-xl font-medium text-sm border ${
                    toast.type === 'error' ? 'bg-rose-50 dark:bg-rose-900/40 text-rose-800 dark:text-rose-300 border-rose-200 dark:border-rose-800' :
                    toast.type === 'warning' ? 'bg-amber-50 dark:bg-amber-900/40 text-amber-800 dark:text-amber-300 border-amber-200 dark:border-amber-800' : 'bg-emerald-50 dark:bg-emerald-900/40 text-emerald-800 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800'
                  }`}
                >
                  <IconAlert /> {toast.message}
                </motion.div>
              ))}
            </AnimatePresence>
          </div>
        </SalaryContext.Provider>
      );
    };

    const Skeleton = ({ className }) => (
      <div className={`animate-pulse bg-slate-200 dark:bg-slate-700/80 rounded ${className}`}></div>
    );

    const AnimatedNumber = ({ value, currency = 'UAH', className = "" }) => {
      const { isPrivateMode } = useSalaryContext();
      const nodeRef = useRef(null);
      const prevValue = useRef(value);

      useEffect(() => {
        const node = nodeRef.current;
        if (!node) return;

        const controls = animate(prevValue.current, value, {
          duration: 0.8,
          ease: "easeOut",
          onUpdate(latest) {
            node.textContent = formatCurrency(latest, currency);
          }
        });

        prevValue.current = value;
        return controls.stop;
      }, [value, currency]);

      return (
        <span 
          ref={nodeRef} 
          className={`font-mono inline-block ${className} ${isPrivateMode ? 'filter blur-[6px] select-none opacity-50' : ''} transition-all duration-300`}
        >
          {formatCurrency(prevValue.current, currency)}
        </span>
      );
    };

    const PrivacyText = ({ text, className = "" }) => {
      const { isPrivateMode } = useSalaryContext();
      return <span className={`${className} ${isPrivateMode ? 'filter blur-[6px] select-none opacity-50 transition-all duration-300' : 'transition-all duration-300'}`}>{text}</span>;
    };

    const CustomSelect = ({ value, onChange, options, icon: Icon, prefix = "", wrapperClass = "bg-slate-50 dark:bg-slate-900/50 border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200", dropdownClass="min-w-[180px]", compact = false }) => {
      const [isOpen, setIsOpen] = useState(false);
      const dropdownRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
        document.addEventListener('mousedown', handleClickOutside); return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const selectedOption = options.find(opt => opt.value === value) || options[0];

      return (
        <div className={`relative ${compact ? 'w-auto' : 'w-full md:w-auto'}`} ref={dropdownRef}>
          <motion.div whileTap={{ scale: 0.97 }} onClick={() => setIsOpen(!isOpen)} className={`flex items-center justify-between space-x-3 p-2 rounded-xl border cursor-pointer transition-colors ${wrapperClass}`}>
            <div className="flex items-center gap-2 px-1">
              {Icon && <div className="text-slate-400 dark:text-slate-500 pl-1"><Icon /></div>}
              <span className="font-bold text-sm md:text-base select-none truncate">{prefix && <span className="font-medium opacity-70 mr-1.5">{prefix}</span>}{selectedOption ? selectedOption.label : 'Оберіть...'}</span>
            </div>
            <div className="pr-1 opacity-50"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}><polyline points="6 9 12 15 18 9"></polyline></svg></div>
          </motion.div>
          <AnimatePresence>
            {isOpen && (
              <motion.div initial={{ opacity: 0, y: -10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }} transition={{ duration: 0.15 }} className={`absolute top-full left-0 md:left-auto md:right-0 mt-2 bg-white/90 dark:bg-slate-900/80 backdrop-blur-md border border-slate-200/50 dark:border-slate-700/50 rounded-xl shadow-2xl z-50 overflow-hidden ${dropdownClass}`}>
                <div className="max-h-64 overflow-y-auto">
                  {options.map(opt => (
                    <div key={opt.value} onClick={() => { onChange(opt.value); setIsOpen(false); }} className={`px-4 py-3 cursor-pointer transition-colors flex items-center justify-between ${value === opt.value ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-bold' : 'text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50'}`}>
                      <span className="truncate">{opt.label}</span>
                      {value === opt.value && <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 ml-3"><polyline points="20 6 9 17 4 12"></polyline></svg>}
                    </div>
                  ))}
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    const ConfirmDeleteButton = ({ onConfirm }) => {
      const [isConfirming, setIsConfirming] = useState(false);
      
      useEffect(() => {
        const handleKeyDown = (e) => { if (e.key === 'Escape') setIsConfirming(false); };
        if (isConfirming) document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [isConfirming]);

      return (
        <button onClick={() => isConfirming ? onConfirm() : setIsConfirming(true)} onMouseLeave={() => setIsConfirming(false)} className={`font-semibold text-sm transition-colors px-2 py-1.5 rounded-lg flex items-center justify-center min-w-[32px] ${isConfirming ? 'bg-rose-100 text-rose-700 dark:bg-rose-900/50 dark:text-rose-400 w-[70px]' : 'text-slate-400 dark:text-slate-500 hover:text-rose-600 dark:hover:text-rose-400 hover:bg-rose-50 dark:hover:bg-slate-800'}`} aria-label={isConfirming ? "Підтвердити" : "Видалити"} title="Видалити">
          {isConfirming ? "Точно?" : <IconTrash />}
        </button>
      );
    };

    const CustomRechartsTooltip = ({ active, payload, mode, currencySymbol }) => {
      const { isPrivateMode } = useSalaryContext();
      if (active && payload && payload.length) {
        const pointData = payload[0].payload;
        return (
          <div className="bg-slate-900/80 dark:bg-slate-900/70 backdrop-blur-md text-white text-xs py-3 px-4 rounded-xl shadow-2xl flex flex-col gap-1.5 border border-white/10 dark:border-slate-600/50 min-w-[150px]">
            <div className="font-semibold text-slate-300 mb-1 border-b border-white/10 dark:border-slate-700/50 pb-1.5 flex justify-between items-center">
              <span>{pointData.monthName} {pointData.year}</span>
              {pointData.hasVacation && <span className="text-[10px] bg-amber-500/20 text-amber-400 px-1.5 py-0.5 rounded ml-2">Відпустка</span>}
            </div>
            {mode === 'hourly' ? (
              <>
                <div className="flex justify-between items-center gap-4 mt-1"><div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div><span className="text-slate-400 font-medium">За годину (₴)</span></div><span className="font-bold text-white font-mono">{isPrivateMode ? '***' : formatCurrency(pointData.hourlyRate)}</span></div>
                <div className="flex justify-between items-center gap-4"><div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-slate-400"></div><span className="text-slate-400 font-medium">За годину ({currencySymbol})</span></div><span className="font-bold text-slate-200 font-mono">{isPrivateMode ? '***' : formatCurrency(pointData.hourlyRateForeign, 'USD')}</span></div>
              </>
            ) : mode === 'bonus' ? (
              <div className="flex justify-between items-center gap-4 mt-1"><div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-purple-500"></div><span className="text-slate-400 font-medium">Премія</span></div><span className="font-bold text-white font-mono">{isPrivateMode ? '***' : (pointData.calculatedBonusPercent || '0%')}</span></div>
            ) : (
              <>
                <div className="flex justify-between items-center gap-4 mt-1"><div className="flex items-center gap-1.5"><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div><span className="text-slate-400 font-medium">В гривнях (₴)</span></div><span className="font-bold text-white font-mono">{isPrivateMode ? '***' : formatCurrency(pointData.netPay)}</span></div>
                <div className="flex justify-between items-center gap-4"><div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-slate-400"></div><span className="text-slate-400 font-medium">USD ({currencySymbol})</span></div><span className="font-bold text-slate-200 font-mono">{isPrivateMode ? '***' : formatCurrency(pointData.foreignEquivalent, 'USD')}</span></div>
                {pointData.calculatedBonusPercent && (
                  <div className="flex justify-between items-center gap-4 pt-1.5 mt-0.5 border-t border-slate-700/50 dark:border-slate-600/50">
                    <div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-purple-500"></div><span className="text-slate-400 font-medium">Премія</span></div>
                    <span className="font-bold text-purple-400 font-mono">{isPrivateMode ? '***' : pointData.calculatedBonusPercent}</span>
                  </div>
                )}
              </>
            )}
            <div className="text-[10px] text-slate-500 italic mt-1.5 text-center border-t border-slate-700/50 dark:border-slate-600/50 pt-1.5">Клікніть для деталей</div>
          </div>
        );
      }
      return null;
    };

    const CustomPieTooltip = ({ active, payload, total }) => {

    const CustomRadarTooltip = ({ active, payload }) => {

    const DashboardChart = React.memo(({ data, showYearInLabels, theme, mode, isPrivateMode, currencySymbol, onPointClick }) => {

      const handleChartClick = (e) => {

      const CustomChartLabel = (props) => {
        const { x, y, value, index, dataKey } = props;
        if (isPrivateMode || !value) return null;

        const isFirst = index === 0;
        const isLast = index === chartData.length - 1;
        let isLocalPeak = false;

        if (index > 0 && index < chartData.length - 1) {
            const prev = chartData[index - 1][dataKey] || 0;
            const next = chartData[index + 1][dataKey] || 0;
            if ((value > prev && value >= next) || (value < prev && value <= next)) isLocalPeak = true;

        const showLabel = chartData.length <= 12 || isFirst || isLast || isLocalPeak;
        if (!showLabel) return null;

        let color = theme === 'dark' ? '#94a3b8' : '#64748b';

        } else {
            displayValue = value >= 1000 ? `${(value / 1000).toFixed(value % 1000 === 0 ? 0 : 1).replace('.0', '')}к` : value;

        const diff = maxVal - (minZero ? 0 : minVal); let step;
        if (diff > 0) { const rawStep = diff / targetCount; const mag = Math.pow(10, Math.floor(Math.log10(rawStep))); const res = rawStep / mag; if (res <= 1.5) step = 1 * mag; else if (res <= 3.5) step = 2.5 * mag; else if (res <= 7.5) step = 5 * mag; else step = 10 * mag; }

        let start = minZero ? 0 : Math.floor(minVal / step) * step; if (start < 0) start = 0;

            <ResponsiveContainer><LineChart onClick={handleChartClick} data={chartData} margin={{ top: 35, right: 0, left: 5, bottom: 0 }}><defs><linearGradient id="colorHourly" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#06b6d4" stopOpacity={1}/><stop offset="100%" stopColor="#3b82f6" stopOpacity={1}/></linearGradient></defs><CartesianGrid strokeDasharray="4 4" vertical={false} stroke={gridStroke} /><XAxis dataKey="id" padding={{ left: 20, right: 20 }} tickFormatter={(val) => { const item = chartData.find(d => d.id === val); return item ? `${item.monthName.slice(0, 3)}${showYearInLabels ? ` '${String(item.year).slice(2)}` : ''}` : val; }} axisLine={false} tickLine={false} tick={{ fill: tickFill, fontSize: 12, fontWeight: 500 }} dy={10} /><YAxis yAxisId="left" dataKey="hourlyRate" axisLine={false} tickLine={false} tick={{ fill: tickFill, fontSize: 12, fontWeight: 500 }} tickFormatter={(val) => isPrivateMode ? '***' : formatCurrency(val)} domain={[uahTicks[0], uahTicks[uahTicks.length - 1]]} ticks={uahTicks} width={85} /><YAxis yAxisId="right" orientation="right" dataKey="hourlyRateForeign" axisLine={false} tickLine={false} tick={{ fill: tickFill, opacity: 0.7, fontSize: 12, fontWeight: 500 }} tickFormatter={(val) => isPrivateMode ? '***' : `${val} ${currencySymbol}`} domain={[foreignTicks[0], foreignTicks[foreignTicks.length - 1]]} ticks={foreignTicks} width={75} /><RechartsTooltip content={<CustomRechartsTooltip mode="hourly" currencySymbol={currencySymbol} />} cursor={{ stroke: tooltipCursor, strokeWidth: 1, strokeDasharray: '4 4' }} />{renderYearMarkers('left')}<Line yAxisId="left" type="monotone" dataKey="hourlyRate" name="Гривні/год (₴)" stroke="url(#colorHourly)" strokeWidth={3} dot={{ r: 4, fill: theme === 'dark' ? '#1e293b' : '#fff', stroke: '#06b6d4', strokeWidth: 2 }} activeDot={{ r: 6, fill: '#06b6d4', strokeWidth: 0 }} isAnimationActive={true}><LabelList dataKey="hourlyRate" content={(props) => <CustomChartLabel {...props} dataKey="hourlyRate" />}/></Line><Line yAxisId="right" type="monotone" dataKey="hourlyRateForeign" name={`USD/год (${currencySymbol})`} stroke={tickFill} strokeWidth={1.5} strokeDasharray="6 6" dot={{ r: 2, fill: theme === 'dark' ? '#1e293b' : '#fff', stroke: tickFill }} activeDot={{ r: 4, fill: tickFill, strokeWidth: 0 }} isAnimationActive={true} /></LineChart></ResponsiveContainer>

tLabel {...props} dataKey="netPay" />}/></Line><Line yAxisId="right" type="monotone" dataKey="foreignEquivalent" name={`USD (${currencySymbol})`} stroke={tickFill} strokeWidth={1.5} strokeDasharray="6 6" dot={{ r: 2, fill: theme === 'dark' ? '#1e293b' : '#fff', stroke: tickFill }} activeDot={{ r: 4, fill: tickFill, strokeWidth: 0 }} isAnimationActive={true} /></LineChart></ResponsiveContainer>

    const DashboardView = () => {

      let yoyAvgNode = null;

        const rows = [];
        
        const topSpacerHeight = virtualItems.length > 0 ? virtualItems[0].top : 0;
        if (topSpacerHeight > 0) rows.push(<tr key="top-spacer" style={{ height: topSpacerHeight }}><td colSpan="5"></td></tr>);

        virtualItems.forEach((item) => {
          if (item.type === 'header') {
            rows.push(<tr key={item.id} className="bg-slate-100/80 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-700 backdrop-blur-sm"><td colSpan="5" className="px-6 py-2.5 text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">{item.year} рік</td></tr>);
          } else {
            const row = item.row;
            rows.push(
              <motion.tr variants={tableRowVariants} key={row.id} className="hover:bg-blue-50/60 dark:hover:bg-slate-700/50 transition-colors duration-300 ease-in-out border-b border-slate-100 dark:border-slate-700/50 last:border-0 group">
                <td className="px-6 py-4 font-medium text-slate-800 dark:text-slate-200 whitespace-nowrap"><div className="flex items-center gap-2"><span>{row.monthName} <span className="text-slate-400 dark:text-slate-500 font-normal ml-1">{selectedYear !== 'all' ? row.year : ''}</span></span>{row.hasVacation && <span className="px-1.5 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 border border-amber-200 dark:border-amber-800">ВІДПУСТКА</span>}</div></td>
                <td className="px-6 py-4 text-right font-bold tabular-nums whitespace-nowrap font-mono tracking-tight" style={getTextColorGradient(row.netPay, minNetPay, maxNetPay, theme)}><PrivacyText text={formatCurrency(row.netPay)} /></td>
                <td className="px-6 py-4 text-blue-600 dark:text-blue-400 font-bold tabular-nums text-right whitespace-nowrap font-mono tracking-tight"><span title={`Курс: ${Number(row.exchangeRate).toFixed(2)}`} className="border-b border-dashed border-blue-200 dark:border-blue-800/50 pb-0.5 cursor-help"><PrivacyText text={formatCurrency(row.foreignEquivalent, 'USD')} /></span></td>
                <td className="px-6 py-4 text-center tabular-nums whitespace-nowrap font-mono">{row.calculatedBonusPercent ? <span className="font-bold text-purple-600 dark:text-purple-400">{row.calculatedBonusPercent}</span> : <span className="text-slate-300 dark:text-slate-600">-</span>}</td>
                <td className="px-6 py-4 text-center whitespace-nowrap">
                  <div className="flex items-center justify-center gap-2 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity duration-300">
                    <button onClick={() => { setSelectedMonthId(row.id); handleTabChange('payslips'); }} className="text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-semibold text-sm transition-colors bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/40 px-3 py-1.5 rounded-lg">Корінець</button>
                    <button onClick={() => startEditing(row.id)} className="text-slate-400 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-800 p-1.5 rounded-lg transition-colors" title="Редагувати"><IconEdit /></button>
                    <ConfirmDeleteButton onConfirm={() => deletePayslip(row.id)} />
                  </div>
                </td>
              </motion.tr>
            );
          }
        });

        const bottomSpacerHeight = virtualItems.length > 0 ? totalHeight - (virtualItems[virtualItems.length - 1].top + virtualItems[virtualItems.length - 1].height) : 0;
        if (bottomSpacerHeight > 0) rows.push(<tr key="bottom-spacer" style={{ height: bottomSpacerHeight }}><td colSpan="5"></td></tr>);

        return rows;
      };

      return (
        <motion.div variants={pageVariants} initial="initial" animate="animate" exit="exit" className="space-y-6 max-w-6xl mx-auto pb-10">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 gap-4 transition-colors">
            <div>
              <h2 className="text-xl font-bold text-slate-800 dark:text-slate-100">Статистика {selectedYear === 'all' ? 'за весь час' : `за ${selectedYear} рік`}</h2>
              <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">Оберіть період для перегляду аналітики</p>
            </div>
            <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-start md:justify-end flex-1">
              <div className="flex items-center bg-emerald-50 dark:bg-emerald-900/20 rounded-xl border border-emerald-100 dark:border-emerald-800/50 flex-1 md:flex-none">
                <div className="px-4 py-2 flex items-center gap-2 border-r border-emerald-200 dark:border-emerald-800/50">
                   <span className="font-bold text-emerald-800 dark:text-emerald-300">USD</span>
                </div>
                <div className="px-3 py-2 flex items-center gap-1.5">
                  <span className="text-xs font-medium text-emerald-600/70 dark:text-emerald-400/70">курс:</span>
                  {isLoadingRate ? <Skeleton className="h-4 w-12" /> : <span className="font-mono text-sm font-bold tracking-tight text-emerald-700 dark:text-emerald-400">{liveRate ? `${liveRate.toFixed(2)} ₴` : '—'}</span>}
                  {isOfflineRate && rateTimestamp && (
                    <span title={`Офлайн режим. Останній курс збережено: ${new Date(rateTimestamp).toLocaleString('uk-UA')}`} className="ml-1 flex items-center text-amber-500 bg-amber-50 dark:bg-amber-900/30 p-1 rounded-md cursor-help">
                      <IconAlert />
                    </span>
                  )}
                </div>
              </div>
              
              <CustomSelect compact value={selectedYear} onChange={setSelectedYear} options={[{ value: 'all', label: 'За весь час' }, ...availableYears.map(y => ({ value: y.toString(), label: y.toString() }))]} prefix="Період:" wrapperClass="bg-blue-50 dark:bg-blue-900/20 border-blue-100 dark:border-blue-800/50 text-blue-900 dark:text-blue-200" />
            </div>
          </div>

          <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row md:items-center justify-between transition-colors gap-4">
            <div className="flex items-center space-x-5">
              <div className="p-3.5 bg-gradient-to-br from-emerald-500 to-teal-600 text-white rounded-xl shadow-lg shadow-emerald-500/30 ring-4 ring-emerald-50 dark:ring-emerald-900/20"><IconMoneyStack /></div>
              <div>
                <p className="text-sm text-slate-500 dark:text-slate-400 font-medium mb-1">Середній дохід в міс.</p>
                <div className="flex flex-wrap items-baseline gap-2 md:gap-3">
                  <h3 className="text-3xl font-black text-blue-600 dark:text-blue-400"><AnimatedNumber value={avgEarnedUAH} currency="UAH" /></h3>
                  <span className="text-lg font-bold text-emerald-600 dark:text-emerald-400">~ <AnimatedNumber value={avgEarnedForeign} currency={'USD'} /></span>
                </div>
                {yoyAvgNode}
              </div>
            </div>
          </div>

          <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
              <div className="flex items-center gap-4 flex-wrap">
                <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2"><IconActivity /> Динаміка</h2>
                {dashboardData.length > 1 && (
                  <div className="flex bg-slate-100 dark:bg-slate-900/80 p-1 rounded-xl transition-colors border border-slate-200 dark:border-slate-700/50">
                    <button onClick={() => setChartMode('income')} className={`px-3 md:px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${chartMode === 'income' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600 dark:text-blue-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300'}`}>Дохід</button>
                    <button onClick={() => setChartMode('bonus')} className={`px-3 md:px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${chartMode === 'bonus' ? 'bg-white dark:bg-slate-800 shadow-sm text-purple-600 dark:text-purple-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300'}`}>Премії %</button>
                    <button onClick={() => setChartMode('hourly')} className={`px-3 md:px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${chartMode === 'hourly' ? 'bg-white dark:bg-slate-800 shadow-sm text-cyan-600 dark:text-cyan-400' : 'text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300'}`}>За год.</button>
                  </div>
                )}
              </div>
              
              {dashboardData.length > 1 && (
                <div className="hidden sm:flex flex-col gap-2 text-xs font-medium text-slate-500 dark:text-slate-400 items-start">
                  {chartMode === 'income' && (
                    <>
                      <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>В гривнях (₴)</div>
                      <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-slate-400 dark:bg-slate-500"></div>USD ({currencySymbol})</div>
                    </>
                  )}
                  {chartMode === 'bonus' && (
                    <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-purple-500"></div>Премія (%)</div>
                  )}
                  {chartMode === 'hourly' && (
                    <>
                      <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-cyan-500"></div>Гривні/год (₴)</div>
                      <div className="flex items-center gap-2"><div className="w-2.5 h-2.5 rounded-full bg-slate-400 dark:bg-slate-500"></div>USD/год ({currencySymbol})</div>
                    </>
                  )}
                </div>
              )}
            </div>
            {dashboardData.length > 1 ? (
              <WidgetErrorBoundary>
                <DashboardChart data={dashboardData} showYearInLabels={selectedYear === 'all'} theme={theme} mode={chartMode} isPrivateMode={isPrivateMode} currencySymbol={currencySymbol} onPointClick={handleChartPointClick} /> 
              </WidgetErrorBoundary>
            ) : (
              <div className="h-64 flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-dashed border-slate-200 dark:border-slate-700 mx-2">
                <IconAreaChart /><p className="mt-3 text-sm font-medium">Додайте дані хоча б за два місяці для побудови графіка</p>
              </div>
            )}
          </div>

          {summaryData.length > 2 && seasonalityInsights && (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 transition-colors">
              <div className="lg:col-span-2 bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col justify-between">
                  <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2 mb-2">
                      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-purple-500"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                      Сезонність доходів
                  </h2>
                  <p className="text-sm text-slate-500 dark:text-slate-400 mb-4">Усереднений чистий дохід по місяцях за весь час</p>
                  <div className="h-[280px] w-full">
                      <ResponsiveContainer width="100%" height="100%">
                          <RadarChart cx="50%" cy="50%" outerRadius="60%" data={seasonalityData}>
                              <PolarGrid stroke={theme === 'dark' ? '#334155' : '#e2e8f0'} />
                              <PolarAngleAxis dataKey="month" tick={<CustomPolarAngleAxis />} />
                              <PolarRadiusAxis angle={30} domain={[0, 'auto']} tick={false} axisLine={false} />
                              <Radar name="Середній дохід" dataKey="average" stroke="#a855f7" strokeWidth={2} fill="#a855f7" fillOpacity={0.3} isAnimationActive={true} />
                              <RechartsTooltip content={<CustomRadarTooltip />} cursor={false} />
                          </RadarChart>
                      </ResponsiveContainer>
                  </div>
              </div>
              
              <div className="lg:col-span-1 bg-gradient-to-br from-purple-50 to-indigo-50 dark:from-purple-900/20 dark:to-indigo-900/20 p-5 md:p-6 rounded-2xl shadow-sm border border-purple-100 dark:border-purple-800/30 flex flex-col justify-center transition-colors">
                   <h3 className="text-sm font-bold text-purple-900 dark:text-purple-300 mb-4 uppercase tracking-wider">Аналіз патернів</h3>
                   
                   <div className="space-y-4">
                       <div className="bg-white/60 dark:bg-slate-800/50 backdrop-blur-sm p-4 rounded-xl border border-white dark:border-slate-700/50 shadow-sm">
                           <div className="flex items-center gap-2 mb-1.5">
                               <span className="text-xl">📈</span>
                               <span className="font-semibold text-slate-700 dark:text-slate-200">Піковий місяць</span>
                           </div>
                           <p className="text-sm text-slate-600 dark:text-slate-400 leading-snug">Історично <strong className="text-slate-800 dark:text-slate-100">{seasonalityInsights.best.fullMonth}</strong> приносить найбільший середній дохід (<span className="font-mono text-purple-600 dark:text-purple-400 font-bold">{formatCurrency(seasonalityInsights.best.average)}</span>).</p>
                       </div>
                       
                       <div className="bg-white/60 dark:bg-slate-800/50 backdrop-blur-sm p-4 rounded-xl border border-white dark:border-slate-700/50 shadow-sm">
                           <div className="flex items-center gap-2 mb-1.5">
                               <span className="text-xl">📉</span>
                               <span className="font-semibold text-slate-700 dark:text-slate-200">Спад активності</span>
                           </div>
                           <p className="text-sm text-slate-600 dark:text-slate-400 leading-snug">Найменш прибутковим у середньому є <strong className="text-slate-800 dark:text-slate-100">{seasonalityInsights.worst.fullMonth}</strong> (<span className="font-mono text-slate-600 dark:text-slate-400 font-bold">{formatCurrency(seasonalityInsights.worst.average)}</span>).</p>
                       </div>
                   </div>
              </div>
            </div>
          )}

          <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors">
            <div className="p-5 md:p-6 border-b border-slate-100 dark:border-slate-700"><h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">Зведена таблиця</h2></div>
            <div className="overflow-x-auto overflow-y-auto max-h-[600px] no-scrollbar relative" onScroll={handleTableScroll}>
              <table className="w-full text-left text-sm relative">
                <thead className="bg-slate-50/90 dark:bg-slate-900/90 backdrop-blur-md text-slate-600 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-30">
                  <tr><th className="px-6 py-4 font-semibold whitespace-nowrap">Місяць</th><th className="px-6 py-4 font-bold text-emerald-600 dark:text-emerald-500 text-right whitespace-nowrap">Зарплата</th><th className="px-6 py-4 font-bold text-blue-600 dark:text-blue-500 text-right whitespace-nowrap">USD ({currencySymbol})</th><th className="px-6 py-4 font-semibold text-center whitespace-nowrap">Премія</th><th className="px-6 py-4 font-semibold text-center whitespace-nowrap">Дія</th></tr>
                </thead>
                <motion.tbody variants={tableContainerVariants} initial="hidden" animate="show">
                  {renderVirtualRows()}
                </motion.tbody>
              </table>
            </div>
          </div>
        </motion.div>
      );
    };

    const PayslipView = () => {
      const { summaryData, selectedMonthId, setSelectedMonthId, startEditing } = useSalaryContext();
      const activeMonthData = summaryData.find(m => m.id === selectedMonthId) || summaryData[0];
      const [showMath, setShowMath] = useState(false);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (!activeMonthData) return;
          const currentIndex = summaryData.findIndex(m => m.id === activeMonthData.id);
          
          if (e.key === 'ArrowLeft' && currentIndex < summaryData.length - 1) {
             setSelectedMonthId(summaryData[currentIndex + 1].id);
          } else if (e.key === 'ArrowRight' && currentIndex > 0) {
             setSelectedMonthId(summaryData[currentIndex - 1].id);
          }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
      }, [summaryData, activeMonthData, setSelectedMonthId]);

      if (!activeMonthData) return <div className="flex justify-center items-center h-64 text-slate-400">Немає даних.</div>;

      const advanceSum = activeMonthData.advanceSum || 0;
      const taxSum = activeMonthData.taxes || 0;

      const trueDeductions = activeMonthData.deductions.filter(d => !d.name.toLowerCase().match(/аванс|виплат|перерахування|банк|картк|о\/р/));
      const payoutItems = activeMonthData.deductions.filter(d => d.name.toLowerCase().match(/аванс|виплат|перерахування|банк|картк|о\/р/));

      const trueDeductionsSum = trueDeductions.reduce((sum, item) => sum + Number(item.amount), 0);

      const ACCRUAL_COLORS = { 'Оклад': '#3b82f6', 'Премія': '#a855f7', 'Відпускні': '#f59e0b', 'Інше': '#94a3b8' };
      const DEDUCTION_PALETTE = ['#f43f5e', '#f97316', '#eab308', '#84cc16', '#06b6d4', '#6366f1', '#8b5cf6'];

      const accrualCategories = { 'Оклад': 0, 'Премія': 0, 'Відпускні': 0, 'Інше': 0 };
      activeMonthData.accruals.forEach(a => {
          const name = a.name.toLowerCase();
          if (name.includes('оклад') || name.includes('тариф')) accrualCategories['Оклад'] += Number(a.amount);
          else if (name.includes('премі')) accrualCategories['Премія'] += Number(a.amount);
          else if (name.includes('відпуст')) accrualCategories['Відпускні'] += Number(a.amount);
          else accrualCategories['Інше'] += Number(a.amount);
      });
      const accrualPieData = Object.entries(accrualCategories).filter(([k, v]) => v > 0).map(([name, value]) => ({ name, value, color: ACCRUAL_COLORS[name] }));

      const deductionPieData = [];
      let colorIndex = 0;
      activeMonthData.deductions.forEach(d => {
          const name = d.name.toLowerCase();
          if (name.includes('аванс') || name.includes('виплат') || name.includes('перерахування') || name.includes('картк') || name.includes('банк') || name.includes('о/р')) return;
          
          let displayName = d.name;
          if (name.includes('податок')) displayName = 'ПДФО';
          else if (name.includes('військов') || name.includes('вз')) displayName = 'Військ. збір';
          else if (name.includes('проф')) displayName = 'Профвнески';
          else if (displayName.length > 15) displayName = displayName.substring(0, 15) + '...';
          
          const existing = deductionPieData.find(item => item.name === displayName);
          if (existing) existing.value += Number(d.amount);
          else {
              deductionPieData.push({ name: displayName, value: Number(d.amount), color: DEDUCTION_PALETTE[colorIndex % DEDUCTION_PALETTE.length] });
              colorIndex++;
          }
      });
      deductionPieData.sort((a, b) => b.value - a.value);

      const totalAccrualPie = accrualPieData.reduce((sum, item) => sum + item.value, 0);
      const totalDeductionPie = deductionPieData.reduce((sum, item) => sum + item.value, 0);

      const activeIndex = summaryData.findIndex(m => m.id === activeMonthData.id);
      const prevMonthData = summaryData[activeIndex + 1];
      const nextMonthData = summaryData[activeIndex - 1];
      const lastYearMonthData = summaryData.find(m => m.month === activeMonthData.month && m.year === activeMonthData.year - 1);
      
      const insights = useMemo(() => {
        if (!activeMonthData || summaryData.length < 2) return [];
        
        const results = [];
        const pastData = summaryData.filter(d => d.id !== activeMonthData.id);
        
        const maxNetPay = Math.max(...summaryData.map(d => d.netPay));
        if (activeMonthData.netPay === maxNetPay && maxNetPay > 0) {
          results.push({ id: 'net-record', type: 'positive', icon: '🏆', text: 'Ви отримали рекордний чистий дохід за весь час!' });
        }
        
        const maxTaxes = Math.max(...summaryData.map(d => d.taxes));
        if (activeMonthData.taxes === maxTaxes && maxTaxes > 0 && pastData.length > 0) {
          results.push({ id: 'tax-record', type: 'neutral', icon: '🏛️', text: `Заплачено рекордну суму податків — ${formatCurrency(maxTaxes)}.` });
        }
        
        const monthsWithBonuses = pastData.filter(d => d.totalBonuses > 0);
        if (activeMonthData.totalBonuses > 0 && monthsWithBonuses.length > 0) {
          const avgBonus = monthsWithBonuses.reduce((sum, d) => sum + d.totalBonuses, 0) / monthsWithBonuses.length;
          const diffPercent = ((activeMonthData.totalBonuses - avgBonus) / avgBonus) * 100;
          
          if (diffPercent > 15) {
            results.push({ id: 'bonus-high', type: 'positive', icon: '🎉', text: `Ваша премія на ${Math.round(diffPercent)}% вища за середню!` });
          } else if (diffPercent < -15) {
            results.push({ id: 'bonus-low', type: 'warning', icon: '📉', text: `Премія цього місяця на ${Math.round(Math.abs(diffPercent))}% нижча за звичайну.` });
          }
        }
        
        const maxHourly = Math.max(...summaryData.map(d => d.hourlyRate));
        if (activeMonthData.hourlyRate === maxHourly && maxHourly > 0 && pastData.length > 0) {
          results.push({ id: 'hourly-record', type: 'positive', icon: '⏱️', text: 'Вартість вашої робочої години досягла історичного максимуму.' });
        }
        
        return results;
      }, [activeMonthData, summaryData]);

      let diffNode = null;
      if (prevMonthData) {
        const diff = activeMonthData.netPay - prevMonthData.netPay;
        const percent = prevMonthData.netPay > 0 ? (diff / prevMonthData.netPay) * 100 : 0;
        diffNode = (
          <div className="mt-3 flex items-center justify-center md:justify-end gap-2 text-sm font-medium">
            {diff > 0 && <span className="flex items-center text-emerald-600 bg-emerald-400/10 px-2.5 py-1 rounded-lg border border-emerald-400/20 dark:text-emerald-400 font-mono tracking-tight"><svg className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg><AnimatedNumber value={Math.abs(diff)} currency="UAH" /> <span className="ml-1.5 opacity-80 text-xs">({percent.toFixed(1)}%)</span></span>}
            {diff < 0 && <span className="flex items-center text-rose-600 bg-rose-400/10 px-2.5 py-1 rounded-lg border border-rose-400/20 dark:text-rose-400 font-mono tracking-tight"><svg className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg><AnimatedNumber value={Math.abs(diff)} currency="UAH" /><span className="ml-1.5 opacity-80 text-xs">({Math.abs(percent).toFixed(1)}%)</span></span>}
            {diff === 0 && <span className="text-slate-400 bg-slate-400/10 px-2.5 py-1 rounded-lg border border-slate-400/20">Без змін</span>}
            <span className="text-slate-500 text-xs ml-1 hidden sm:inline-block">до мин. міс.</span>
          </div>
        );
      }

      let yoyNode = null;
      if (lastYearMonthData) {
        const yoyDiff = activeMonthData.netPay - lastYearMonthData.netPay;
        const yoyPercent = lastYearMonthData.netPay > 0 ? (yoyDiff / lastYearMonthData.netPay) * 100 : 0;
        yoyNode = (
          <div className="mt-2 text-xs font-medium flex items-center justify-center md:justify-end gap-1.5 opacity-90 font-mono">
             <span className="text-slate-400 font-sans">YoY ({activeMonthData.monthName} {lastYearMonthData.year}):</span>
             {yoyDiff > 0 && <span className="text-emerald-600 dark:text-emerald-400 flex items-center">+{yoyPercent.toFixed(1)}% <svg className="w-3 h-3 ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg></span>}
             {yoyDiff < 0 && <span className="text-rose-600 dark:text-rose-400 flex items-center">{yoyPercent.toFixed(1)}% <svg className="w-3 h-3 ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" /></svg></span>}
             {yoyDiff === 0 && <span className="text-slate-400 font-sans">Без змін</span>}
          </div>
        );
      }

      return (
        <motion.div variants={pageVariants} initial="initial" animate="animate" exit="exit" className="space-y-6 max-w-5xl mx-auto pb-12">
          
          <div className="bg-white dark:bg-slate-800 p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col md:flex-row justify-between items-start md:items-center gap-5 transition-colors">
            <div className="flex items-center space-x-4">
              <div className="bg-blue-600 p-3 rounded-xl text-white shadow-sm"><IconFileText /></div>
              <div>
                <h1 className="text-xl md:text-2xl font-bold text-slate-800 dark:text-slate-100 flex flex-wrap items-center gap-2 md:gap-3">
                  Розрахунковий лист
                  {activeMonthData.hasVacation && <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 border border-amber-200 dark:border-amber-800">ВІДПУСТКА</span>}
